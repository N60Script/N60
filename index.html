<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>N60 Hub | Stable Edition v14.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #000; }
        body { background: var(--bg); color: white; direction: rtl; font-family: 'Consolas', monospace; text-align: center; padding: 20px; }
        .panel { max-width: 800px; margin: auto; background: #0a0a0a; border: 2px solid var(--p); padding: 25px; border-radius: 15px; }
        textarea { width: 100%; height: 150px; background: #000; color: var(--p); border: 1px solid #222; padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 12px; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <h1 style="color:var(--p)">N60 STABLE v14.0</h1>
    <p style="font-size:11px; opacity:0.5;">تم الإصلاح ليعمل على (Delta, Arceus X, Fluxus)</p>
    
    <textarea id="srcIn" placeholder="ضع كود Lua هنا..."></textarea>
    <button class="btn" onclick="build()">تشفير مستقر 🛡️</button>
    <textarea id="resOut" readonly placeholder="الكود الناتج..."></textarea>
    <button class="btn" style="background:#444; color:#fff;" onclick="copy()">نسخ 📋</button>
</div>

<script type="application/lua" id="core">
function stable_build(source)
    local k1 = math.random(50, 150)
    local r = ""
    for i=1, #source do
        -- استخدام إزاحة رياضية بسيطة ومستقرة جداً
        local b = string.byte(source, i)
        r = r .. (b + k1) .. ","
    end
    
    local final = "--[[ N60 STABLE v14.0 ]]\n"
    final = final .. "local _D = {" .. r .. "}\n"
    final = final .. "local _K = " .. k1 .. "\n"
    final = final .. [[
local _VM = function(d, k)
    local s = ""
    for i=1, #d do
        s = s .. string.char(d[i] - k)
    end
    local f, e = loadstring(s)
    if f then 
        local success, err = pcall(f)
        if not success then warn("Execution Error: "..tostring(err)) end
    else 
        warn("Syntax Error: "..tostring(e))
    end
end
_VM(_D, _K)
]]
    return final
end
</script>

<script>
    function build() {
        const input = document.getElementById('srcIn').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('core').innerText)();
        fengari.lua.lua_getglobal(L, "stable_build");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('resOut').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }
    function copy() {
        const out = document.getElementById('resOut');
        out.select();
        document.execCommand('copy');
        alert("تم النسخ! جربه الآن.");
    }
</script>
</body>
</html>
