<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | ULTIMATE OBFUSCATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --neon: #00ff6a; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background: var(--bg); color: white; direction: rtl; margin: 0; padding: 20px; }

        /* تنسيق الموقع ليكون ضخماً وواضحاً */
        .container { max-width: 1000px; margin: auto; text-align: center; }
        
        h1 { font-size: 3rem; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin-bottom: 30px; }
        p { font-size: 1.5rem; opacity: 0.8; }

        /* أزرار التحميل الأصلية (Executor Download) */
        .download-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .dl-card { background: var(--card); border: 2px solid #222; padding: 30px; border-radius: 20px; transition: 0.3s; text-decoration: none; color: white; }
        .dl-card:hover { border-color: var(--neon); transform: translateY(-10px); box-shadow: 0 0 30px rgba(0,255,106,0.2); }
        .dl-card b { font-size: 2rem; display: block; color: var(--neon); }
        .dl-card span { font-size: 1.2rem; opacity: 0.6; }

        /* منطقة التشفير */
        .obf-box { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid #1a1a1a; }
        textarea { width: 100%; height: 300px; background: #000; color: var(--neon); border: 2px solid #222; padding: 20px; border-radius: 15px; font-size: 1.3rem; margin-bottom: 20px; outline: none; transition: 0.3s; font-family: 'Consolas', monospace; }
        textarea:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        .btn-main { width: 100%; padding: 25px; background: var(--neon); color: black; border: none; font-weight: 900; border-radius: 15px; cursor: pointer; font-size: 2rem; transition: 0.3s; box-shadow: 0 10px 0 #009e41; }
        .btn-main:active { transform: translateY(5px); box-shadow: 0 0 0; }

        .btn-copy { width: 100%; padding: 20px; background: #222; color: white; border: 1px solid #444; border-radius: 15px; cursor: pointer; font-size: 1.5rem; margin-top: 20px; transition: 0.3s; }
        .btn-copy.success { background: white; color: black; }
    </style>
</head>
<body>

<div class="container">
    <h1>N60 HUB 🛡️</h1>
    <p>الموقع الرسمي لتشفير السكربتات وتحميل المشغلات</p>

    <div class="download-section">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="dl-card">
            <b>DELTA IOS 🍎</b>
            <span>تثبيت مباشر للايفون</span>
        </a>
        <a href="https://delta-executor.com/Delta.apk" class="dl-card">
            <b>DELTA APK 🤖</b>
            <span>تحميل مباشر للاندرويد</span>
        </a>
        <a href="itms-services://?action=download-manifest&url=https://skibx.com/ota.plist" class="dl-card">
            <b>SKIBX IOS 🍎</b>
            <span>تثبيت مباشر للايفون</span>
        </a>
        <a href="https://spdmteam.com/Arceus.apk" class="dl-card">
            <b>ARCEUS APK 🤖</b>
            <span>تحميل مباشر للاندرويد</span>
        </a>
    </div>

    <div class="obf-box">
        <textarea id="srcInput" placeholder="-- الصق كود الـ LUA هنا..."></textarea>
        
        <button class="btn-main" onclick="runObfuscation()">تشفير الكود الآن 🔥</button>
        
        <textarea id="resOutput" readonly placeholder="الكود المشفّر سيظهر هنا..."></textarea>
        
        <button id="copyBtn" class="btn-copy" onclick="copyResult()">نسخ الكود المشفّر 📋</button>
    </div>
</div>

<script type="application/lua" id="obfEngine">
function build_ultimate(source)
    local k = math.random(100, 500)
    local data = {}
    -- التشفير الحقيقي
    for i=1, #source do
        table.insert(data, (string.byte(source, i) + k))
    end
    
    -- إضافة كمية ضخمة من الأكواد الوهمية (Junk) لتعقيد البايثون
    local junk = "local _v={}; "
    for i=1, 50 do junk = junk .. "local _f" .. i .. " = " .. math.random(1000, 9999) .. "; " end

    local payload = table.concat(data, ",")
    
    -- لودر (Loader) معقد ومستقر
    return "--[[ N60 ULTIMATE PROTECTION v30 ]]\n" .. junk .. "\nlocal _D={" .. payload .. "}\nlocal _K=" .. k .. "\nlocal _S=''\nfor i=1,#_D do _S=_S..string.char(_D[i]-_K) end\nlocal _E=loadstring(_S)\nif _E then _E() end"
end
</script>

<script>
    function runObfuscation() {
        const input = document.getElementById('srcInput').value;
        const btn = document.querySelector('.btn-main');
        
        if(!input) {
            alert("يا بطل، حط الكود أولاً!");
            return;
        }

        btn.innerText = "جاري التشفير... ⏳";
        
        // استخدام setTimeout لضمان عدم تعليق المتصفح أثناء التشفير
        setTimeout(() => {
            try {
                const L = fengari.L;
                fengari.load(document.getElementById('obfEngine').innerText)();
                fengari.lua.lua_getglobal(L, "build_ultimate");
                fengari.lua.lua_pushstring(L, input);
                
                if(fengari.lua.lua_pcall(L, 1, 1, 0) == 0) {
                    const result = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
                    document.getElementById('resOutput').value = result;
                    btn.innerText = "تم التشفير بنجاح! ✅";
                } else {
                    alert("حدث خطأ في الكود حقك، تأكد منه!");
                    btn.innerText = "تشفير الكود الآن 🔥";
                }
            } catch(e) {
                console.error(e);
                btn.innerText = "فشل التشفير ❌";
            }
        }, 100);
    }

    function copyResult() {
        const res = document.getElementById('resOutput');
        const btn = document.getElementById('copyBtn');
        if(!res.value) return;

        res.select();
        document.execCommand('copy');
        
        btn.innerText = "تم النسخ! ✅";
        btn.className = "btn-copy success";
        
        setTimeout(() => {
            btn.innerText = "نسخ الكود المشفّر 📋";
            btn.className = "btn-copy";
        }, 2000);
    }
</script>
</body>
</html>
