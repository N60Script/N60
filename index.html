<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fused Obfuscator V2 | Taurus & BlueSecure</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --accent: #10b981; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 900px; }
        h1 { text-align: center; color: var(--primary); text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .box-container { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--primary); }
        textarea { width: 100%; height: 220px; background: #020617; border: 1px solid #1e293b; border-radius: 8px; color: var(--accent); padding: 15px; font-family: 'Consolas', monospace; resize: vertical; box-sizing: border-box; }
        .encrypt-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; margin-bottom: 10px; }
        .encrypt-btn:hover { background: #2563eb; transform: scale(1.01); }
        .copy-btn { position: absolute; top: 15px; left: 20px; background: var(--accent); color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .footer { opacity: 0.5; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fused Obfuscator (Taurus + BlueSecure)</h1>

        <div class="box-container">
            <label>ضع سكربت Lua هنا:</label>
            <textarea id="inputCode" placeholder="-- Paste your script here..."></textarea>
        </div>

        <button class="encrypt-btn" onclick="obfuscateNow()">تشفير السكربت (Double Layer) 🔥</button>

        <div class="box-container">
            <label>الكود المشفر النهائي:</label>
            <button class="copy-btn" onclick="copyResult()">نسخ الكود</button>
            <textarea id="outputCode" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
        </div>
    </div>

    <div class="footer">Ghost-Ducky#7698 | GitHub Edition</div>

    <script type="application/lua" id="luaSource">
        -- إصلاح البيئة للمتصفح
        local function typeof(obj) return type(obj) end
        local os = { clock = function() return 0 end }
        local tick = function() return 0 end
        local warn = function(msg) print("LOG: " .. tostring(msg)) end

        -- طبقة Taurus (معدلة لتعمل 100% في المتصفح)
        function taurus_layer(source, VarName)
            local Variable = VarName or "Taurus_"
            local SourceByte = ""
            for i = 1, #source do 
                SourceByte = SourceByte .. "'\\" .. string.byte(source, i) .. "'," 
            end
            return "local " .. Variable .. " = {" .. SourceByte .. "}; loadstring(table.concat(" .. Variable .. "))()"
        end

        -- طبقة BlueSecure (Binary Encoding)
        function blue_layer(source)
            local function EncodeBinary(Text)
                local encoded = ""
                for i = 1, #Text do
                    local byte = string.byte(Text:sub(i,i))
                    encoded = encoded .. "\\" .. byte
                end
                return encoded
            end
            
            local header = "--[[ Protected by BlueSecure 1.3 ]]\n"
            local payload = "loadstring(\"" .. EncodeBinary(source) .. "\")()"
            return header .. "getfenv().ProtectedByBlueSecure = true; " .. payload
        end

        -- الدالة الرئيسية للربط مع JS
        function process_encryption(input)
            if not input or input == "" then return "Error: No input provided" end
            
            -- تشغيل Taurus
            local step1 = taurus_layer(input, "Ducky_" .. math.random(100,999))
            
            -- تشغيل BlueSecure فوقها
            local final = blue_layer(step1)
            
            return final
        end
    </script>

    <script>
        function obfuscateNow() {
            const input = document.getElementById('inputCode').value;
            if(!input) return alert("الرجاء إدخال كود!");

            document.getElementById('outputCode').value = "جاري التشفير...";

            try {
                const L = fengari.L;
                const luaCode = document.getElementById('luaSource').innerText;
                fengari.load(luaCode)();
                
                // استدعاء دالة المعالجة
                fengari.lua.lua_getglobal(L, "process_encryption");
                fengari.lua.lua_pushstring(L, input);
                fengari.lua.lua_pcall(L, 1, 1, 0);
                
                const result = fengari.lua.lua_tostring(L, -1);
                document.getElementById('outputCode').value = result;
            } catch (err) {
                document.getElementById('outputCode').value = "خطأ تقني: " + err.message;
            }
        }

        function copyResult() {
            const output = document.getElementById('outputCode');
            if(!output.value || output.value.includes("...")) return;
            output.select();
            document.execCommand('copy');
            alert("تم النسخ بنجاح!");
        }
    </script>
</body>
</html>
