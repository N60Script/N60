<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | Direct Installer v21.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; direction: rtl; margin: 0; padding: 0; }
        
        /* Navigation */
        .nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid var(--p); sticky: top; z-index: 100; }
        .nav button { background: #1a1a1a; border: 1px solid var(--p); color: var(--p); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .nav button.active { background: var(--p); color: black; }

        .container { padding: 20px; max-width: 900px; margin: auto; }
        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }

        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #222; }
        h1 { color: var(--p); text-align: center; margin: 0 0 15px; }

        /* Installer Buttons */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .install-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 20px 10px; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .install-btn:hover { border-color: var(--p); background: #222; transform: translateY(-5px); }
        .install-btn b { color: var(--p); font-size: 1.1rem; }
        .install-btn small { opacity: 0.6; }

        /* Obfuscator UI */
        textarea { width: 100%; height: 150px; background: #000; color: var(--p); border: 1px solid #333; padding: 15px; border-radius: 10px; font-family: monospace; margin: 10px 0; outline: none; }
        .btn-action { width: 100%; padding: 18px; background: var(--p); color: black; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="nav">
    <button id="tab-obf" class="active" onclick="show('obf')">المُشفر 🛡️</button>
    <button id="tab-and" onclick="show('android')">أندرويد 🤖</button>
    <button id="tab-ios" onclick="show('ios')">آيفون 🍎</button>
</div>

<div class="container">
    
    <div id="obf" class="section active">
        <div class="card">
            <h1>N60 STABLE VM v21.0</h1>
            <p style="text-align:center; opacity:0.6; font-size:12px;">تم تحسين الكود ليعمل على جميع المشغلات بدون كراش</p>
            <textarea id="src" placeholder="الصق كود Lua هنا..."></textarea>
            <button class="btn-action" onclick="runBuild()">تشفير الكود 🚀</button>
            <textarea id="res" readonly placeholder="الكود الناتج..."></textarea>
            <button class="btn-action" style="background:#333; color:#fff; margin-top:10px;" onclick="copyCode()">نسخ 📋</button>
        </div>
    </div>

    <div id="android" class="section">
        <div class="card">
            <h1>Android Direct Install 🤖</h1>
            <div class="grid">
                <div class="install-btn" onclick="installAPK('https://delta-executor.com/Delta.apk')">
                    <b>Delta</b> <small>تحميل APK مباشر</small>
                </div>
                <div class="install-btn" onclick="installAPK('https://spdmteam.com/ArceusX.apk')">
                    <b>Arceus X</b> <small>تثبيت فوري</small>
                </div>
                <div class="install-btn" onclick="installAPK('https://fluxteam.net/Fluxus.apk')">
                    <b>Fluxus</b> <small>نسخة الأندرويد</small>
                </div>
            </div>
        </div>
    </div>

    <div id="ios" class="section">
        <div class="card">
            <h1>iOS Direct Install 🍎</h1>
            <div class="grid">
                <div class="install-btn" onclick="installIOS('https://delta.bz/manifest.plist')">
                    <b>Delta iOS</b> <small>تثبيت خارجي (OTA)</small>
                </div>
                <div class="install-btn" onclick="installIOS('https://skibx.com/ota.plist')">
                    <b>SkibX iOS</b> <small>تثبيت مباشر</small>
                </div>
                <div class="install-btn" onclick="installIOS('https://ronix.com/manifest.plist')">
                    <b>Ronix iOS</b> <small>بدء التثبيت</small>
                </div>
            </div>
        </div>
    </div>

</div>

<script type="application/lua" id="luaLogic">
function build_script(source)
    local k = math.random(10, 100)
    local enc = ""
    for i=1, #source do
        enc = enc .. (string.byte(source, i) + k) .. ","
    end
    return "--[[ N60 STABLE v21 ]]\nlocal _D={"..enc.."}\nlocal _K="..k..[[
local s=""
for i=1,#_D do s=s..string.char(_D[i]-_K) end
local f,e=loadstring(s)
if f then pcall(f) else print(e) end]]
end
</script>

<script>
    // نظام التنقل
    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('tab-' + id.substring(0,3)).classList.add('active');
    }

    // وظائف التثبيت المباشر
    function installIOS(plistUrl) {
        window.location.href = "itms-services://?action=download-manifest&url=" + plistUrl;
    }

    function installAPK(apkUrl) {
        // للأندرويد التحميل المباشر هو فتح الرابط
        window.location.href = apkUrl;
    }

    // وظيفة التشفير
    function runBuild() {
        const input = document.getElementById('src').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('luaLogic').innerText)();
        fengari.lua.lua_getglobal(L, "build_script");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('res').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }

    function copyCode() {
        const res = document.getElementById('res');
        res.select();
        document.execCommand('copy');
        alert("تم النسخ بنجاح!");
    }
</script>
</body>
</html>
