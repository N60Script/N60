<script type="application/lua" id="ghostEngine">
function ghost_protect(source)
    local seed = math.random(100, 999)
    local junk = ""
    -- فخ البيانات: نصوص عشوائية ضخمة لتضليل بايثون
    for i=1, 200 do junk = junk .. math.random(1000, 9999) .. "." end
    
    local encoded = ""
    for i=1, #source do
        local byte = string.byte(source, i)
        -- تشفير متعدد المعادلات (Self-Modifying Logic)
        local val
        if i % 2 == 0 then
            val = (byte + seed) * 3 + i
        else
            val = (byte + seed) * 2 - i
        end
        encoded = encoded .. val .. "|"
    end

    local final = "--[[ N60 GHOST v25.0 ]]\n"
    final = final .. "local _JUNK = '" .. junk .. "'\n"
    final = final .. "local _DATA = '" .. encoded .. "'\n"
    final = final .. "local _S = " .. seed .. "\n"
    final = final .. [[
local _ENV = getfenv()
local _G_ID = (game and game.PlaceId) or 0 -- Environment Key
local _V = function()
    local res = ""
    local count = 0
    for v in _DATA:gmatch("(%d+)|") do
        count = count + 1
        local d = tonumber(v)
        local char
        if count % 2 == 0 then
            char = (d - count) / 3 - _S
        else
            char = (d + count) / 2 - _S
        end
        res = res .. string.char(math.floor(char + 0.5))
    end
    local f, e = loadstring(res)
    if f then 
        setfenv(f, _ENV)
        pcall(f)
    end
end
-- فحص بسيط للبيئة (Anti-Python)
if not _G or not _G.game then 
   -- إذا كان يعمل في بايثون أو Sandbox خارجي، يعطي بيانات خاطئة
   _S = _S + 99 
end
_V()
]]
    return final
end
</script>
