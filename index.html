<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fused Lua Obfuscator</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 { color: var(--primary); text-align: center; }
        .box-title { margin-bottom: 8px; font-weight: bold; display: block; }
        textarea {
            width: 100%;
            height: 200px;
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 8px;
            color: #cbd5e1;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            box-sizing: border-box;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 25px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-encrypt { background: var(--primary); color: white; }
        .btn-encrypt:hover { opacity: 0.8; transform: scale(1.05); }
        .output-container { position: relative; }
        .btn-copy {
            position: absolute;
            top: 40px;
            left: 10px;
            background: #10b981;
            color: white;
            padding: 5px 12px;
            font-size: 12px;
        }
        .footer { margin-top: 40px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fused Lua Obfuscator</h1>
        
        <label class="box-title">ضع سكربتك هنا:</label>
        <textarea id="inputCode" placeholder="-- Paste your Lua script here..."></textarea>

        <div class="controls">
            <button class="btn-encrypt" onclick="runObfuscation()">تشفير السكربت الآن 🔥</button>
        </div>

        <div class="output-container">
            <label class="box-title">الكود المشفر:</label>
            <button class="btn-copy" onclick="copyCode()">نسخ الكود</button>
            <textarea id="outputCode" readonly placeholder="Result will appear here..."></textarea>
        </div>
    </div>

    <div class="footer">Powered by Taurus & BlueSecure Layer</div>

    <script type="application/lua" id="obfEngine">
        -- [هنا نضع الكود الذي أعطيتني إياه مع تعديل بسيط للربط]
        -- سأختصر الكود هنا لسهولة النسخ، ولكن عند التطبيق ضع الكود كاملاً
        
        -- نفس الدوال التي أرسلتها (taurus_obfuscate, bluesecure_obfuscate)
        -- ... (ضع الكود الكامل هنا) ...

        function obfuscate_script(source)
            -- First pass: Taurus
            local status1, taurus_obf = pcall(taurus_obfuscate, source, "Taurus_", "Fused")
            if not status1 then return "Error in Taurus Layer: " .. tostring(taurus_obf) end
            
            -- Second pass: BlueSecure
            local status2, final = pcall(bluesecure_obfuscate, taurus_obf)
            if not status2 then return "Error in BlueSecure Layer: " .. tostring(final) end
            
            return final
        end
    </script>

    <script>
        function runObfuscation() {
            const input = document.getElementById('inputCode').value;
            if(!input) return alert("الرجاء وضع كود أولاً!");
            
            document.getElementById('outputCode').value = "جاري التشفير... انتظر قليلاً";
            
            // استدعاء Lua من JavaScript باستخدام Fengari
            try {
                const luaObf = fengari.L;
                const luaCode = document.getElementById('obfEngine').innerText;
                fengari.load(luaCode)();
                
                const obfuscate = fengari.lua.lua_getglobal(luaObf, "obfuscate_script");
                fengari.lua.lua_pushstring(luaObf, input);
                fengari.lua.lua_pcall(luaObf, 1, 1, 0);
                
                const result = fengari.lua.lua_tostring(luaObf, -1);
                document.getElementById('outputCode').value = result;
            } catch (err) {
                document.getElementById('outputCode').value = "خطأ في التشفير: " + err;
            }
        }

        function copyCode() {
            const output = document.getElementById('outputCode');
            output.select();
            document.execCommand('copy');
            alert("تم نسخ الكود المشفر بنجاح!");
        }
    </script>
</body>
</html>
