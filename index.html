<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | GHOST EDITION v25.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #020202; --card: #080808; }
        body { background: var(--bg); color: white; direction: rtl; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .box { max-width: 900px; margin: 20px auto; background: var(--card); border: 1px solid #1a1a1a; padding: 25px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,255,106,0.05); }
        h1 { color: var(--p); letter-spacing: 5px; text-align: center; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: #111; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; text-align: center; text-decoration: none; }
        .nav-btn:hover { border-color: var(--p); background: #161616; }

        textarea { width: 100%; height: 160px; background: #000; color: var(--p); border: 1px solid #111; padding: 15px; border-radius: 12px; font-family: 'Consolas', monospace; font-size: 12px; margin-bottom: 15px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--p); }

        .btn-main { width: 100%; padding: 18px; background: var(--p); color: #000; border: none; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; margin-bottom: 10px; }
        .btn-main:active { transform: scale(0.98); }

        /* زر النسخ الجديد والمميز */
        .btn-copy { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: 1px solid #333; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .btn-copy.success { background: #fff; color: #000; border-color: #fff; }
    </style>
</head>
<body>

<div class="box">
    <h1>N60 GHOST PROTOCOL v25 🛡️</h1>
    
    <div class="nav-grid">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="nav-btn">تثبيت DELTA IOS 🍎</a>
        <a href="https://delta-executor.com/Delta.apk" class="nav-btn">تحميل DELTA APK 🤖</a>
        <a href="itms-services://?action=download-manifest&url=https://skibx.com/ota.plist" class="nav-btn">تثبيت SKIBX IOS 🍎</a>
        <a href="https://spdmteam.com/Arceus.apk" class="nav-btn">تحميل ARCEUS APK 🤖</a>
    </div>

    <textarea id="input" placeholder="-- ضع كود الـ Lua الأصلي هنا..."></textarea>
    
    <button class="btn-main" onclick="processGhost()">تشفير بروتوكول الشبح 🚀</button>
    
    <textarea id="output" readonly placeholder="الكود المعمّى سيظهر هنا..."></textarea>
    
    <button id="copyBtn" class="btn-copy" onclick="copyResult()">نسخ الكود المشفّر 📋</button>
</div>

<script type="application/lua" id="ghostEngine">
function ghost_protect(source)
    local seed = math.random(100, 999)
    local encoded = ""
    for i=1, #source do
        local byte = string.byte(source, i)
        local val = (i % 2 == 0) and ((byte + seed) * 3 + i) or ((byte + seed) * 2 - i)
        encoded = encoded .. val .. "|"
    end
    return "--[[ N60 GHOST v25 ]]\nlocal _S="..seed.."\nlocal _D='"..encoded.."'\nlocal _V=function() local r='' local c=0 for v in _D:gmatch('(%d+)|') do c=c+1 local d=tonumber(v) local b=(c%2==0) and ((d-c)/3-_S) or ((d+c)/2-_S) r=r..string.char(math.floor(b+0.5)) end local f=loadstring(r) if f then setfenv(f,getfenv()) pcall(f) end end; _V()"
end
</script>

<script>
    function processGhost() {
        const input = document.getElementById('input').value;
        if(!input) return alert("أدخل الكود أولاً!");
        const L = fengari.L;
        fengari.load(document.getElementById('ghostEngine').innerText)();
        fengari.lua.lua_getglobal(L, "ghost_protect");
        fengari.lua.lua_pushstring(L, input);
        if(fengari.lua.lua_pcall(L, 1, 1, 0) == 0) {
            document.getElementById('output').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
            // إعادة ضبط زر النسخ
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = "نسخ الكود المشفّر 📋";
            btn.className = "btn-copy";
        }
    }

    function copyResult() {
        const output = document.getElementById('output');
        const btn = document.getElementById('copyBtn');
        
        if(!output.value) return;

        output.select();
        document.execCommand('copy');
        
        // تغيير شكل الزر للتأكيد
        btn.innerHTML = "تم النسخ بنجاح! ✅";
        btn.className = "btn-copy success";
        
        setTimeout(() => {
            btn.innerHTML = "نسخ الكود المشفّر 📋";
            btn.className = "btn-copy";
        }, 2000);
    }
</script>
</body>
</html>
