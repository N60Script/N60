<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Absolute Zero v13.0</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --p: #00ff6a; --bg: #000; }
    body { background: var(--bg); color: white; direction: rtl; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { width: 90%; max-width: 1100px; background: #050505; border: 1px solid var(--p); padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,255,106,0.1); }
    textarea { width: 100%; height: 250px; background: #000; border: 1px solid #1a1a1a; color: var(--p); padding: 20px; border-radius: 12px; font-size: 11px; outline: none; }
    .btn-fire { width: 100%; padding: 20px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 12px; font-size: 1.4rem; transition: 0.4s; }
    .btn-fire:hover { background: #fff; box-shadow: 0 0 60px #fff; transform: scale(1.02); }
</style>
</head>
<body>

<div class="box">
    <h1 style="color:var(--p); text-align:center; margin-bottom:10px;">N60 ABSOLUTE ZERO v13.0 ❄️</h1>
    <p style="text-align:center; opacity:0.4; font-size:12px; margin-bottom:20px;">Chained XOR Logic | Stack Obfuscation | Anti-Python Recovery</p>
    
    <textarea id="srcIn" placeholder="-- ضع كود الـ Lua المراد حمايته هنا..."></textarea>
    <button class="btn-fire" onclick="buildAbsoluteZero()">توليد التشفير المطلق 🛡️</button>
    <textarea id="resOut" readonly placeholder="الكود الناتج..."></textarea>
</div>

<script type="application/lua" id="absoluteLogic">
function build_zero(source)
    local keys = {math.random(10, 50), math.random(51, 100), math.random(101, 200)}
    
    local function chained_enc(data, ks)
        local r = {}
        local last = ks[1]
        for i=1, #data do
            local byte = string.byte(data, i)
            -- Chained XOR: كل بايت يعتمد على البايت السابق + مفتاح متغير
            local dynamic_key = (last + ks[2] + i) % 256
            local encrypted = byte ~ dynamic_key
            table.insert(r, encrypted)
            last = encrypted -- ربط السلسلة
        end
        return table.concat(r, ",")
    end

    local bytecode = chained_enc(source, keys)
    local output = "--[[ N60 ABSOLUTE ZERO v13.0 ]]\n"
    output = output .. "local _Z = {" .. bytecode .. "}\n"
    output = output .. "local _K = {" .. table.concat(keys, ",") .. "}\n"
    output = output .. [[
local _VM = function(d, k)
    local res = {}
    local last = k[1]
    for i=1, #d do
        local dynamic_key = (last + k[2] + i) % 256
        local char_code = d[i] ~ dynamic_key
        table.insert(res, string.char(char_code))
        last = d[i]
    end
    local f, e = loadstring(table.concat(res))
    if f then pcall(f) else warn(e) end
end
_VM(_Z, _K)
]]
    return output
end
</script>

<script>
    function buildAbsoluteZero() {
        const input = document.getElementById('srcIn').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('absoluteLogic').innerText)();
        fengari.lua.lua_getglobal(L, "build_zero");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('resOut').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }
</script>
</body>
</html>
