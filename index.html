<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | V22.0 Final</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; direction: rtl; margin: 0; padding: 0; }
        
        /* Navigation */
        .nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 8px; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .nav button { background: #1a1a1a; border: 1px solid var(--p); color: var(--p); padding: 10px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.3s; }
        .nav button.active { background: var(--p); color: black; box-shadow: 0 0 10px var(--p); }

        .container { padding: 20px; max-width: 900px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease-in; }

        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #222; }
        h1 { color: var(--p); text-align: center; margin: 0 0 15px; font-size: 1.8rem; }

        /* Installer Buttons */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .install-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px 5px; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.3s; display: flex; flex-direction: column; gap: 5px; }
        .install-btn:hover { border-color: var(--p); transform: translateY(-3px); background: #1e1e1e; }
        .install-btn b { color: var(--p); font-size: 1rem; }
        .install-btn small { opacity: 0.6; font-size: 0.75rem; }

        /* Obfuscator UI */
        textarea { width: 100%; height: 160px; background: #000; color: var(--p); border: 1px solid #333; padding: 12px; border-radius: 10px; font-family: monospace; margin: 10px 0; outline: none; font-size: 12px; }
        .btn-action { width: 100%; padding: 16px; background: var(--p); color: black; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="nav">
    <button id="tab-obf" class="active" onclick="show('obf')">تشفير مستقر 🛡️</button>
    <button id="tab-and" onclick="show('android')">أندرويد 🤖</button>
    <button id="tab-ios" onclick="show('ios')">آيفون 🍎</button>
</div>

<div class="container">
    
    <div id="obf" class="section active">
        <div class="card">
            <h1>N60 STABLE v22.0 🛡️</h1>
            <p style="text-align:center; opacity:0.6; font-size:11px;">Hex-Encrypted | Works on Delta, Arceus, Skibx</p>
            <textarea id="src" placeholder="-- الصق كود Lua هنا..."></textarea>
            <button class="btn-action" onclick="runBuild()">تشفير الكود  </button>
            <textarea id="res" readonly placeholder="الكود الناتج..."></textarea>
            <button class="btn-action" style="background:#333; color:#fff; margin-top:10px;" onclick="copyCode()">نسخ الكود المشفّر 📋</button>
        </div>
    </div>

    <div id="android" class="section">
        <div class="card">
            <h1>Android Install 🤖</h1>
            <div class="grid">
                <div class="install-btn" onclick="dlAPK('https://delta-executor.com/Delta.apk')">
                    <b>Delta</b> <small>تنزيل APK مباشر</small>
                </div>
                <div class="install-btn" onclick="dlAPK('https://spdmteam.com/ArceusX.apk')">
                    <b>Arceus X</b> <small>تثبيت فوري</small>
                </div>
                <div class="install-btn" onclick="dlAPK('https://fluxteam.net/Fluxus.apk')">
                    <b>Fluxus</b> <small>رابط مباشر</small>
                </div>
            </div>
        </div>
    </div>

    <div id="ios" class="section">
        <div class="card">
            <h1>iOS OTA Install 🍎</h1>
            <div class="grid">
                <div class="install-btn" onclick="dlIOS('https://delta.bz/manifest.plist')">
                    <b>Delta iOS</b> <small>Install Direct</small>
                </div>
                <div class="install-btn" onclick="dlIOS('https://skibx.com/ota.plist')">
                    <b>SkibX iOS</b> <small>OTA Install</small>
                </div>
                <div class="install-btn" onclick="dlIOS('https://ronix.com/ota.plist')">
                    <b>Ronix iOS</b> <small>تثبيت مباشر</small>
                </div>
            </div>
        </div>
    </div>

</div>

<script type="application/lua" id="engineLogic">
function build_v22(source)
    -- تشفير Hex لضمان أن الـ Executor يقرأه كنص بسيط لا يستهلك الذاكرة
    local encoded = ""
    for i = 1, #source do
        encoded = encoded .. string.format("%%%02X", string.byte(source, i))
    end
    
    local final = "--[[ N60 STABLE v22.0 ]]\n"
    final = final .. "local _D = '" .. encoded .. "'\n"
    final = final .. [[
local function _R(s)
    local r = s:gsub('%%(%x%x)', function(h) return string.char(tonumber(h, 16)) end)
    local f, e = loadstring(r)
    if f then pcall(f) else warn("Err: "..tostring(e)) end
end
_R(_D)]]
    return final
end
</script>

<script>
    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('tab-' + id.substring(0,3)).classList.add('active');
    }

    // التثبيت المباشر
    function dlIOS(plist) {
        window.location.href = "itms-services://?action=download-manifest&url=" + plist;
    }
    function dlAPK(url) {
        window.location.href = url;
    }

    function runBuild() {
        const input = document.getElementById('src').value;
        if(!input) return alert("أدخل كود!");
        const L = fengari.L;
        fengari.load(document.getElementById('engineLogic').innerText)();
        fengari.lua.lua_getglobal(L, "build_v22");
        fengari.lua.lua_pushstring(L, input);
        if(fengari.lua.lua_pcall(L, 1, 1, 0) == 0) {
            document.getElementById('res').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
        }
    }

    function copyCode() {
        const res = document.getElementById('res');
        res.select();
        document.execCommand('copy');
        alert("تم النسخ! جربه الآن.");
    }
</script>
</body>
</html>
