<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Executor & Obfuscator</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>

<style>
/* التصميم الأساسي */
* { box-sizing: border-box; font-family: "Segoe UI", Tahoma; }
body {
    margin: 0;
    background: radial-gradient(circle at top, #111, #000);
    height: 100vh;
    overflow: hidden;
    direction: rtl;
    color: white;
}

.frame { width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; }

/* الهيدر */
.header {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    border-bottom: 1px solid rgba(0,255,120,0.2);
    background: rgba(0,0,0,0.9);
    z-index: 100;
}

.nav-btn {
    background: transparent;
    border: 2px solid #00ff6a;
    color: #00ff6a;
    padding: 10px 25px;
    border-radius: 15px;
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
    transition: 0.3s;
}

.nav-btn.active {
    background: #00ff6a;
    color: black;
    box-shadow: 0 0 20px rgba(0,255,120,0.5);
}

/* محتوى الصفحات */
.content-section {
    flex: 1;
    overflow-y: auto;
    display: none;
    padding: 20px 0;
    position: relative;
}

.content-section.active { display: block; }

/* النجوم */
.stars { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.2; animation: twinkle 2s infinite ease-in-out; }
@keyframes twinkle { 0%,100% { opacity: 0.1; } 50% { opacity: 1; } }

/* ستايل العناصر */
.item {
    width: 85%;
    max-width: 700px;
    margin: 30px auto;
    padding: 30px;
    background: rgba(40,40,40,0.5);
    border-radius: 25px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,120,0.2);
    text-align: center;
    position: relative;
    z-index: 1;
}

.install {
    display: inline-block;
    padding: 12px 40px;
    font-size: 20px;
    font-weight: bold;
    color: white;
    text-decoration: none;
    border-radius: 15px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ff6a, #00b84a);
    box-shadow: 0 0 20px rgba(0,255,120,0.4);
    border: none;
    transition: 0.3s;
}

/* ستايل التشفير */
.obf-container {
    width: 90%;
    max-width: 800px;
    margin: 0 auto;
    background: rgba(20, 20, 20, 0.9);
    padding: 25px;
    border-radius: 20px;
    border: 1px solid #333;
    position: relative;
    z-index: 1;
}

textarea {
    width: 100%;
    height: 180px;
    background: #000;
    border: 1px solid #00ff6a;
    color: #00ff41;
    padding: 15px;
    font-family: 'Consolas', monospace;
    border-radius: 10px;
    margin-top: 10px;
    resize: none;
}

.obf-btn {
    width: 100%;
    padding: 15px;
    margin: 20px 0;
    background: #00ff6a;
    color: black;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
}

.copy-area { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }

.warning { padding: 15px; text-align: center; color: #ff4d4d; font-size: 14px; background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.1); }
</style>
</head>

<body>

<div class="frame">
    <div class="header">
        <button type="button" class="nav-btn active" onclick="showTab('hub', event)">تحميل الهاك</button>
        <button type="button" class="nav-btn" onclick="showTab('obf', event)">تشفير سكربت</button>
    </div>

    <div id="hub" class="content-section active">
        <div class="stars" id="stars"></div>
        <div class="item">
            <h3 style="font-size: 32px; color: #00ff6a;">Delta IOS</h3>
            <p>افضل برنامج executor للايفون</p>
            <button type="button" class="install" onclick="installDelta()">تثبيت</button>
        </div>
        <div class="item">
            <h3 style="font-size: 32px; color: #00ff6a;">SkibX IOS</h3>
            <p>لا يوجد مفتاح وواجهته متحركه</p>
            <button type="button" class="install" onclick="installSkibX()">تثبيت</button>
        </div>
        <div class="item">
            <h3 style="font-size: 32px; color: #00ff6a;">Delta APK</h3>
            <p>دالتا أندرويد فقط</p>
            <a class="install" href="https://gloopup.net/Delta/android/" target="_blank">تثبيت</a>
        </div>
    </div>

    <div id="obf" class="content-section">
        <div class="stars" id="stars2"></div>
        <div class="obf-container">
            <h2 style="text-align: center; color: #00ff6a;">N60 Shield Obfuscator</h2>
            <label>ضع سكربت Lua هنا:</label>
            <textarea id="inputCode" placeholder="print('Hello N60 Hub')"></textarea>
            
            <button type="button" class="obf-btn" onclick="runObfuscation()">تشفير وحماية السكربت 🔥</button>
            
            <div class="copy-area">
                <label>الكود المشفر الناتج:</label>
                <button type="button" class="nav-btn" style="font-size: 14px; padding: 5px 15px;" onclick="copyCode()">نسخ 📋</button>
            </div>
            <textarea id="outputCode" readonly placeholder="سوف يظهر الكود هنا..."></textarea>
        </div>
    </div>

    <div class="warning">
        إخلاء مسؤولية: استخدام الهاك على مسؤوليتك الخاصة. نحن نضمن أمان التطبيق ولكن لا نتحمل مسؤولية ما تفعله داخل اللعبة.
    </div>
</div>

<script type="application/lua" id="luaLogic">
    local function to_byte_format(str)
        local result = ""
        for i = 1, #str do
            result = result .. "\\" .. string.byte(str, i)
        end
        return result
    end

    function protect(source)
        if not source or source == "" then return "-- [!] No Input" end
        local encrypted_data = to_byte_format(source)
        local template = "-- Protected by N60 Obfuscator\n"
        template = template .. "-- https://n60script.github.io/N60/\n\n"
        template = template .. "local _env = (getgenv or getfenv)()\n"
        template = template .. "local _bytecode = \"" .. encrypted_data .. "\"\n"
        template = template .. "local _load = _env.loadstring or loadstring\n"
        template = template .. "pcall(function() return _load(_bytecode)() end)"
        return template
    end
</script>

<script>
// تبديل الصفحات مع منع السلوك الافتراضي
function showTab(tabId, event) {
    if (event) event.preventDefault();
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    if (event) event.currentTarget.classList.add('active');
}

// إنشاء النجوم في القسمين
function createStars(containerId) {
    const container = document.getElementById(containerId);
    for (let i = 0; i < 100; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 2 + "s";
        container.appendChild(s);
    }
}
createStars("stars");
createStars("stars2");

function installDelta() { window.location.href = "itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist"; }
function installSkibX() { window.location.href = "itms-services://?action=download-manifest&url=https://skibx.com/ota.plist"; }

function runObfuscation() {
    const input = document.getElementById('inputCode').value;
    if(!input) return alert("الرجاء وضع السكربت!");
    
    const L = fengari.L;
    const luaSource = document.getElementById('luaLogic').innerText;
    
    try {
        fengari.load(luaSource)();
        fengari.lua.lua_getglobal(L, "protect");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        
        const result = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
        document.getElementById('outputCode').value = result;
    } catch (e) {
        alert("خطأ: " + e.message);
    }
}

function copyCode() {
    const out = document.getElementById('outputCode');
    if(!out.value) return;
    out.select();
    document.execCommand('copy');
    alert("تم نسخ الكود المشفر!");
}
</script>

</body>
</html>
