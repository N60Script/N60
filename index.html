<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Stable Event Horizon v8.1</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --p: #00ff6a; --bg: #000; --card: #0a0a0a; }
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { margin: 0; background: var(--bg); color: white; direction: rtl; overflow-x: hidden; }
    .wrapper { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background: radial-gradient(circle at top, #001f0d, #000); }
    
    /* Executors Section */
    .dl-section { width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .dl-card { background: var(--card); border: 1px solid #1a1a1a; padding: 25px; border-radius: 15px; text-align: center; transition: 0.3s; }
    .dl-card:hover { border-color: var(--p); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,106,0.1); }
    .dl-btn { display: inline-block; margin-top: 15px; padding: 12px 25px; background: var(--p); color: #000; text-decoration: none; border-radius: 8px; font-weight: 900; }

    /* Obfuscator Section */
    .obf-container { width: 100%; max-width: 900px; background: var(--card); border: 2px solid var(--p); padding: 35px; border-radius: 25px; }
    textarea { width: 100%; height: 180px; background: #000; border: 1px solid #222; color: var(--p); padding: 15px; border-radius: 10px; margin: 15px 0; font-family: 'Consolas', monospace; font-size: 12px; resize: none; }
    .btn-build { width: 100%; padding: 20px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.3rem; transition: 0.3s; }
    .btn-copy { width: 100%; margin-top: 10px; padding: 12px; background: transparent; border: 1px solid #333; color: #666; cursor: pointer; border-radius: 8px; font-weight: bold; }
    .btn-copy:hover { border-color: var(--p); color: var(--p); }
</style>
</head>
<body>

<div class="wrapper">
    <h1 style="color:var(--p); margin-bottom:10px;">N60 HUB v8.1 🛡️</h1>
    <p style="opacity:0.6; margin-bottom:40px;">نظام التشفير المستقر (تم إصلاح توافق المشغلات)</p>

    <div class="dl-section">
        <div class="dl-card">
            <h3>Delta Executor</h3>
            <p style="font-size:12px; color:#777;">يدعم الأندرويد والايفون</p>
            <a href="https://delta-executor.com" target="_blank" class="dl-btn">صفحة التحميل 📥</a>
        </div>
        <div class="dl-card">
            <h3>Arceus X Neo</h3>
            <p style="font-size:12px; color:#777;">أداء عالي للأجهزة الحديثة</p>
            <a href="https://spdmteam.com" target="_blank" class="dl-btn">تحميل APK 🚀</a>
        </div>
    </div>

    <div class="obf-container">
        <h2 style="color:var(--p); margin:0;">GHOST ENGINE (Stable Mode)</h2>
        <textarea id="inputCode" placeholder="-- ضع سكربت Lua هنا..."></textarea>
        <button class="btn-build" onclick="generateShield()">تشفير وحماية (Fix Applied) 🛡️</button>
        <textarea id="outputCode" readonly placeholder="الكود المصلح سيظهر هنا..."></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">نسخ الكود المشفّر 📋</button>
    </div>

    <p style="margin-top:50px; font-size:10px; color:#222; letter-spacing:4px;">N60 HUB SOVEREIGN FINALITY 2026</p>
</div>

<script type="application/lua" id="luaEngine">
    function stable_shield(source)
        local k1, k2, k3 = math.random(50,100), math.random(101,150), math.random(151,200)
        local ops = {1, 2, 3}
        for i = #ops, 2, -1 do
            local j = math.random(i)
            ops[i], ops[j] = ops[j], ops[i]
        end
        local G, L, C = ops[1], ops[2], ops[3]
        
        -- وظيفة التشفير الجديدة (إصلاح الفواصل)
        local function enc(s, k)
            local r = ""
            for i=1, #s do r = r .. (string.byte(s, i) ~ k) .. "," end
            return r
        end

        local target = source:match("'(.-)'") or source:match('"(.-)"') or "N60_SECURE"
        
        local out = "--[[ N60 EVENT HORIZON v8.1 | FIXED ]]\n"
        out = out .. "local _D = {{ " .. (G ~ k1) .. ", '" .. enc("print", k2) .. "' }, { " .. (L ~ k1) .. ", '" .. enc(target, k2) .. "' }, { " .. (C ~ k1) .. " }}\n"
        out = out .. "local _K = {" .. k1 .. "," .. k2 .. "," .. k3 .. "}\n"
        out = out .. [[
local _E = (getgenv or getfenv)()
local _S = {}
local function _I(instr, keys)
    local p = 1
    local k1, k2, k3 = keys[1], keys[2], keys[3]
    
    -- وظيفة فك التشفير المصلحة (إصلاح الفواصل)
    local function _u(d, k)
        local s = ""
        for b in d:gmatch("(%d+),") do s = s .. string.char(tonumber(b) ~ k) end
        return s
    end

    while p <= #instr do
        local i = instr[p]
        local c = i[1] ~ k1
        if c == ]] .. G .. [[ then
            table.insert(_S, _E[_u(i[2], k2)])
        elseif c == ]] .. L .. [[ then
            local m = ""
            local r = _u(i[2], k2)
            for j=1, #r do m = m .. (string.byte(r, j) ~ k3) .. "," end
            table.insert(_S, m)
        elseif c == ]] .. C .. [[ then
            local val = _u(table.remove(_S), k3)
            local func = table.remove(_S)
            if func then func(val) end
        end
        p = p + 1
    end
end
pcall(_I, _D, _K)
_D = nil; _K = nil; _I = nil;
]]
        return out
    end
</script>

<script>
    function generateShield() {
        const input = document.getElementById('inputCode').value;
        if(!input) return alert("أدخل الكود أولاً!");
        const L = fengari.L;
        fengari.load(document.getElementById('luaEngine').innerText)();
        fengari.lua.lua_getglobal(L, "stable_shield");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('outputCode').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }

    function copyToClipboard() {
        const out = document.getElementById('outputCode');
        if(!out.value) return;
        out.select();
        document.execCommand('copy');
        alert("تم النسخ بنجاح! السكربت جاهز للتشغيل ✅");
    }
</script>
</body>
</html>
