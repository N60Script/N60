<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | ULTIMATE HYBRID OBFUSCATOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    
    <style>
        :root { --neon: #00ff6a; --bg: #000; --card: #0d0d0d; }
        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background: var(--bg); color: white; direction: rtl; margin: 0; padding: 20px; }

        .container { max-width: 1100px; margin: auto; text-align: center; }
        
        h1 { font-size: 4rem; color: var(--neon); text-shadow: 0 0 30px var(--neon); margin-bottom: 10px; }
        .sub-title { font-size: 1.8rem; opacity: 0.7; margin-bottom: 40px; }

        /* قسم تحميل المشغلات (بأسلوبك الضخم) */
        .exec-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .exec-card { background: var(--card); border: 3px solid #1a1a1a; padding: 40px; border-radius: 25px; transition: 0.3s; text-decoration: none; color: white; }
        .exec-card:hover { border-color: var(--neon); transform: scale(1.05); box-shadow: 0 0 40px rgba(0,255,106,0.3); }
        .exec-card b { font-size: 2.5rem; display: block; color: var(--neon); }
        .exec-card span { font-size: 1.3rem; opacity: 0.5; }

        /* منطقة التشفير الاحترافية */
        .obf-area { background: var(--card); padding: 50px; border-radius: 40px; border: 2px solid #111; position: relative; }
        .CodeMirror { width: 100%; height: 400px; background: #000; border: 2px solid #222; border-radius: 20px; font-size: 1.5rem; text-align: left; margin-bottom: 30px; }
        
        .status-bar { font-size: 1.6rem; margin: 20px 0; font-weight: bold; min-height: 40px; }

        .btn-giant { width: 100%; padding: 30px; background: var(--neon); color: black; border: none; font-weight: 900; border-radius: 20px; cursor: pointer; font-size: 2.5rem; transition: 0.2s; box-shadow: 0 12px 0 #009e41; }
        .btn-giant:active { transform: translateY(8px); box-shadow: 0 4px 0 #009e41; }

        .actions-row { display: none; gap: 20px; margin-top: 30px; }
        .btn-sub { flex: 1; padding: 20px; background: #1a1a1a; color: white; border: 2px solid #333; border-radius: 15px; cursor: pointer; font-size: 1.8rem; font-weight: bold; }
        .btn-sub:hover { border-color: var(--neon); background: #222; }

        footer { margin-top: 60px; padding: 30px; border-top: 1px solid #111; font-size: 1.4rem; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>N60 HUB 🛡️</h1>
    <div class="sub-title">نظام التشفير الهجين (WeAreDevs API + N60 Logic)</div>

    <div class="exec-grid">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="exec-card">
            <b>DELTA IOS 🍎</b>
            <span>تثبيت مباشر (OTA)</span>
        </a>
        <a href="https://delta-executor.com/Delta.apk" class="exec-card">
            <b>DELTA APK 🤖</b>
            <span>تحميل مباشر (ANDROID)</span>
        </a>
        <a href="itms-services://?action=download-manifest&url=https://skibx.com/ota.plist" class="exec-card">
            <b>SKIBX IOS 🍎</b>
            <span>تثبيت مباشر (OTA)</span>
        </a>
    </div>

    <div class="obf-area">
        <textarea id="lua-input">-- ضع كود الـ Lua هنا للبدء...</textarea>
        
        <div id="status" class="status-bar">جاهز للعمل...</div>
        
        <button class="btn-giant" id="obf-trigger">تشفير وحماية السورس 🔥</button>
        
        <div id="output-container" style="display:none; margin-top: 40px;">
            <h2 style="color: var(--neon); font-size: 2rem;">الكود المشفّر النهائي:</h2>
            <textarea id="lua-output"></textarea>
            
            <div class="actions-row" id="actions">
                <button class="btn-sub" onclick="copyResult()">نسخ الكود 📋</button>
                <button class="btn-sub" onclick="downloadResult()">تحميل الملف 📥</button>
                <button class="btn-sub" onclick="location.reload()" style="background:#300;">تصفير 🔄</button>
            </div>
        </div>
    </div>
</div>

<footer>
    © 2026 N60 PROTOCOL | POWERED BY HYBRID ENCRYPTION
</footer>

<script>
    // تهيئة محرر الإدخال
    const inputEditor = CodeMirror.fromTextArea(document.getElementById("lua-input"), {
        mode: "lua",
        theme: "monokai",
        lineNumbers: true,
        indentUnit: 4,
        lineWrapping: true
    });

    // تهيئة محرر الإخراج
    const outputEditor = CodeMirror.fromTextArea(document.getElementById("lua-output"), {
        mode: "lua",
        theme: "monokai",
        lineNumbers: true,
        readOnly: true,
        lineWrapping: true
    });

    const obfBtn = document.getElementById("obf-trigger");
    const status = document.getElementById("status");

    obfBtn.addEventListener("click", async () => {
        const scriptText = inputEditor.getValue();
        if (scriptText.length < 1) return;

        obfBtn.style.display = "none";
        status.innerText = "جاري الاتصال بالسيرفر وتطبيق التشفير المزدوج... ⏳";
        status.style.color = "var(--neon)";

        try {
            // 1. محاولة استخدام تشفير WeAreDevs عبر الـ API الخاص بهم
            const response = await fetch("/api/obfuscate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ script: scriptText })
            });

            let resultScript = "";

            if (response.ok) {
                const data = await response.json();
                // دمج تشفير السيرفر مع تشفير N60 v30 الإضافي
                resultScript = applyN60Protection(data.obfuscated);
            } else {
                // إذا فشل السيرفر، نستخدم تشفير N60 القوي مباشرة
                resultScript = applyN60Protection(scriptText);
            }

            // إظهار النتائج
            document.getElementById("output-container").style.display = "block";
            outputEditor.setValue(resultScript);
            outputEditor.refresh();
            
            status.innerText = "تم التشفير بنجاح (HYBRID MODE ACTIVE) ✅";
            document.getElementById("actions").style.display = "flex";

        } catch (e) {
            // Fallback في حالة عدم وجود إنترنت أو خطأ في الـ API
            let localObf = applyN60Protection(scriptText);
            document.getElementById("output-container").style.display = "block";
            outputEditor.setValue(localObf);
            outputEditor.refresh();
            status.innerText = "تم التشفير باستخدام N60 Local Engine ✅";
            document.getElementById("actions").style.display = "flex";
        }
    });

    // دالة تشفير N60 v30 (تشفير السورس + أكواد وهمية ضخمة)
    function applyN60Protection(src) {
        const key = Math.floor(Math.random() * 250) + 10;
        let junk = "";
        // توليد 100 سطر وهمي
        for(let i=0; i<700; i++) {
            junk += `local _fake_var_${i} = ${Math.random()*9999}; `;
        }
        
        const bytes = src.split('').map(c => c.charCodeAt(0) + key).join(',');
        
        return `--[[ N60 HYBRID PROTECTOR v30 ]]\n${junk}\nlocal _K = ${key} local _D = {${bytes}} local _S = "" for i=1, #_D do _S = _S .. string.char(_D[i] - _K) end local _F, _E = loadstring(_S) if _F then _F() else print(_E) end`;
    }

    function copyResult() {
        navigator.clipboard.writeText(outputEditor.getValue());
        status.innerText = "تم النسخ بنجاح! 📋";
        setTimeout(() => status.innerText = "تم التشفير بنجاح ✅", 2000);
    }

    function downloadResult() {
        const blob = new Blob([outputEditor.getValue()], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `N60_Hybrid_${Date.now()}.lua`;
        a.click();
    }
</script>

</body>
</html>
