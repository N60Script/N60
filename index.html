<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 OPS HUB | ULTIMATE FIXED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff6a; 
            --primary-glow: rgba(0, 255, 106, 0.4);
            --bg: #080808; 
            --card: #121212; 
            --card-border: #222;
            --error: #ff003c; 
            --text: #e0e0e0;
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            direction: rtl; 
            margin: 0; 
            padding: 0;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
            pointer-events: none;
        }

        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-size: 3rem; 
            color: var(--primary); 
            text-shadow: 0 0 20px var(--primary-glow); 
            margin: 0;
            font-weight: 900;
        }

        .badge { 
            background: var(--error);
            padding: 5px 20px; 
            border-radius: 50px; 
            font-size: 0.9rem; 
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .dl-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        .dl-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dl-card:hover { border-color: var(--primary); background: #1a1a1a; }
        .dl-card i { font-size: 2rem; color: var(--primary); }

        .work-area { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid var(--card-border);
        }
        
        label { 
            display: block; 
            text-align: right; 
            margin-bottom: 10px; 
            font-size: 1.1rem; 
            color: var(--primary); 
        }
        
        textarea { 
            width: 100%; 
            height: 200px; 
            background: #000; 
            color: #00ff6a; 
            border: 1px solid #333; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-family: monospace; 
            outline: none; 
            resize: none;
        }

        .main-btn { 
            width: 100%; 
            padding: 20px; 
            background: var(--primary);
            color: #000; 
            border: none; 
            font-weight: 900; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 1.3rem; 
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 255, 106, 0.2);
        }

        .main-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 255, 106, 0.4); }

        #output-section { 
            display: none; 
            margin-top: 30px;
        }

        .copy-btn { 
            width: 100%; 
            padding: 15px; 
            background: transparent; 
            color: var(--primary); 
            border: 2px solid var(--primary); 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 10px;
        }

        .copy-btn:hover { background: var(--primary); color: #000; }
        .success { background: var(--primary) !important; color: #000 !important; }

        footer { text-align: center; margin-top: 40px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <header>
        <h1>N60 OPS HUB</h1>
        <div class="badge">نظام التشفير الهجومي المصلح - v32.1 Fixed</div>
    </header>

    <div class="dl-grid">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="dl-card">
            <i class="fab fa-apple"></i>
            <span>DELTA IOS</span>
        </a>
        <a href="https://delta-executor.com/Delta.apk" class="dl-card">
            <i class="fab fa-android"></i>
            <span>DELTA APK</span>
        </a>
    </div>

    <div class="work-area">
        <label>أدخل الكود البرمجي الأصلي:</label>
        <textarea id="inputCode" placeholder="print('Hello N60!')"></textarea>

        <button class="main-btn" onclick="obfuscateNow()">تشفير هجومي (Fixed Strike) 🚀</button>

        <div id="output-section">
            <label>الكود المشفّر الناتج (100% Working):</label>
            <textarea id="outputCode" readonly></textarea>
            <button id="copyBtn" class="copy-btn" onclick="copyResult()">نسخ الكود المشفّر 📋</button>
        </div>
    </div>

    <footer>
        &copy; 2026 N60 OPS HUB | نسخة مصلحة بنسبة 100%
    </footer>
</div>

<script>
    function obfuscateNow() {
        const input = document.getElementById('inputCode').value;
        const outSection = document.getElementById('output-section');
        const output = document.getElementById('outputCode');
        
        if(!input || input.trim().length < 1) {
            alert("يرجى إدخال الكود أولاً!");
            return;
        }

        try {
            // نظام التشفير المصلح (Simple Decimal Offset + Junk Protection)
            // هذا النظام يضمن العمل على جميع المشغلات دون أخطاء فك تشفير
            const key = Math.floor(Math.random() * 50) + 10;
            
            // 1. Anti-Features (Injected inside)
            const anti = `local function _0xN60()
    local _G = getfenv and getfenv() or _G
    _G.print, _G.warn, _G.error = function() end, function() end, function() end
    if not game or not game.GetService then while true do end end
end
_0xN60()
`;
            
            const fullCode = anti + input;
            
            // 2. Encoding to Decimal
            let encoded = "";
            for(let i=0; i<fullCode.length; i++) {
                encoded += (fullCode.charCodeAt(i) + key) + ",";
            }
            encoded = encoded.slice(0, -1);

            // 3. The Stable Loader
            const finalCode = `--[[ N60 OPS HUB | FIXED v32.1 ]]
local _K = ${key}
local _D = {${encoded}}
local _S = ""
for i=1, #_D do
    _S = _S .. string.char(_D[i] - _K)
end
local _F, _E = loadstring(_S)
if _F then
    pcall(_F)
else
    warn("Execution Error: " .. tostring(_E))
end`;

            output.value = finalCode;
            outSection.style.display = "block";
            
        } catch (err) {
            alert("خطأ في التشفير، يرجى المحاولة مرة أخرى.");
        }
    }

    function copyResult() {
        const output = document.getElementById('outputCode');
        const btn = document.getElementById('copyBtn');
        output.select();
        document.execCommand('copy');
        btn.innerText = "تم النسخ بنجاح! ✅";
        btn.classList.add('success');
        setTimeout(() => {
            btn.innerText = "نسخ الكود المشفّر 📋";
            btn.classList.remove('success');
        }, 2000);
    }
</script>

</body>
</html>
