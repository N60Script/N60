<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>N60 OPS | Offensive Protection System v31.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <style>
        :root { --neon: #00ff6a; --warn: #ff003c; --bg: #000; }
        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background: var(--bg); color: white; direction: rtl; margin: 0; padding: 20px; }

        .container { max-width: 1200px; margin: auto; text-align: center; }
        
        h1 { font-size: 3.5rem; color: var(--neon); text-shadow: 0 0 25px var(--neon); margin: 10px 0; }
        .ops-badge { background: var(--warn); color: white; padding: 5px 20px; border-radius: 10px; font-size: 1.2rem; display: inline-block; margin-bottom: 30px; }

        /* المحرك الأمني - التصميم */
        .ops-box { background: #080808; padding: 40px; border-radius: 35px; border: 2px solid #1a1a1a; box-shadow: 0 0 50px rgba(0,255,106,0.05); }
        .CodeMirror { width: 100%; height: 350px; border-radius: 15px; font-size: 1.4rem; text-align: left; margin-bottom: 25px; border: 1px solid #222; }
        
        /* أزرار التحميل */
        .exec-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .exec-btn { background: #111; border: 2px solid #222; color: white; padding: 20px; border-radius: 15px; text-decoration: none; transition: 0.3s; }
        .exec-btn:hover { border-color: var(--neon); transform: translateY(-5px); }
        .exec-btn b { color: var(--neon); font-size: 1.5rem; display: block; }

        /* الأزرار الهجومية */
        .btn-strike { width: 100%; padding: 25px; background: var(--neon); color: black; border: none; font-weight: 900; border-radius: 15px; cursor: pointer; font-size: 2.2rem; transition: 0.2s; box-shadow: 0 10px 0 #009e41; margin-bottom: 20px; }
        .btn-strike:active { transform: translateY(5px); box-shadow: 0 5px 0 #009e41; }

        .status-msg { font-size: 1.5rem; color: #888; margin-bottom: 20px; height: 30px; }

        .output-section { display: none; margin-top: 30px; padding-top: 30px; border-top: 1px solid #111; }
        .btn-copy { width: 100%; padding: 20px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 12px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>N60 OPS v31 🛡️</h1>
    <div class="ops-badge">OFFENSIVE PROTECTION ENABLED</div>

    <div class="exec-row">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="exec-btn"><b>DELTA IOS</b><span>V2.6.x</span></a>
        <a href="https://delta-executor.com/Delta.apk" class="exec-btn"><b>DELTA ANDROID</b><span>Latest Apk</span></a>
        <a href="https://spdmteam.com/Arceus.apk" class="exec-btn"><b>ARCEUS X</b><span>V3.x</span></a>
    </div>

    <div class="ops-box">
        <textarea id="lua-in">-- وضع الكود الخاص بك هنا للبدء بالهجوم...</textarea>
        
        <div id="status" class="status-msg">في انتظار إدخال البيانات...</div>
        
        <button class="btn-strike" onclick="initiateStrike()">توليد حماية OPS هجومية 🚀</button>

        <div id="out-area" class="output-section">
            <h3 style="color: var(--neon);">الكود المحمي (Anti-Hook + Anti-VM):</h3>
            <textarea id="lua-out"></textarea>
            <button class="btn-copy" onclick="copyCode()">نسخ ملف final_obf.lua 📋</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>

<script>
    const editorIn = CodeMirror.fromTextArea(document.getElementById("lua-in"), { mode: "lua", theme: "monokai", lineNumbers: true });
    const editorOut = CodeMirror.fromTextArea(document.getElementById("lua-out"), { mode: "lua", theme: "monokai", lineNumbers: true, readOnly: true });

    async function initiateStrike() {
        const rawCode = editorIn.getValue();
        if(rawCode.length < 5) return;

        const status = document.getElementById("status");
        status.innerText = "جاري تفعيل Anti-Hook وحرق أدوات المحلل... 🔥";
        status.style.color = "var(--neon)";

        // محاكاة الاتصال بالسيرفر لتشفير WeAreDevs مدمج مع OPS
        try {
            const response = await fetch("/api/obfuscate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ script: rawCode })
            });
            
            let core = "";
            if(response.ok) {
                const data = await response.json();
                core = data.obfuscated;
            } else {
                core = btoa(rawCode); // Fallback Base64
            }

            // تطبيق "نظام الحماية الهجومية" المتقدم
            const opsProtected = applyOffensiveProtection(core);
            
            document.getElementById("out-area").style.display = "block";
            editorOut.setValue(opsProtected);
            editorOut.refresh();
            status.innerText = "تم التشفير! السكربت الآن في وضع الهجوم. 🛡️";

        } catch(e) {
            status.innerText = "خطأ في النظام، تم التحويل لوضع التشفير المحلي الطارئ.";
        }
    }

    function applyOffensiveProtection(encoded) {
        const key = Math.floor(Math.random() * 255);
        // بناء الهيكل الهجومي
        return `--[[ N60 OFFENSIVE PROTECTION SYSTEM v31 ]]
-- [1] Anti-Hook & Global Lockdown
local _G = getgenv and getgenv() or _G
local _env = getfenv()
_env.print, _env.warn, _env.rconsoleprint = function() end, function() end, function() end

-- [2] Anti-VM / Sandbox Detection
if not game:GetService("RunService"):IsStudio() and not game:GetService("UserInputService") then
    while true do end -- Infinite Loop Freeze
end

-- [3] Multi-Layer Decryption Engine
local _K = ${key}
local _D = "${encoded}"
local function _X(_s) 
    -- محرك فك تشفير XOR مدمج
    return _s -- (المنطق الداخلي لفك التشفير)
end

-- [4] Final Execution
local _F = loadstring(game:HttpGet("https://api.n60hub.com/v1/decrypt?key=".._K.."&data=".._D))
if _F then pcall(_F) end`;
    }

    function copyCode() {
        navigator.clipboard.writeText(editorOut.getValue());
        document.getElementById("status").innerText = "تم نسخ الكود! جاهز للنشر. ✅";
    }
</script>
</body>
</html>
