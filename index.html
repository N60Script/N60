<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Event Horizon v8.4 (Syntax Fix)</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --p: #00ff6a; --bg: #000; --card: #0a0a0a; }
    * { box-sizing: border-box; font-family: 'Consolas', monospace; }
    body { margin: 0; background: var(--bg); color: white; direction: rtl; }
    .wrapper { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; background: radial-gradient(circle at top, #001f0d, #000); }
    .obf-panel { width: 100%; max-width: 900px; background: var(--card); border: 2px solid var(--p); padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,255,106,0.1); margin-top: 50px; }
    textarea { width: 100%; height: 200px; background: #000; border: 1px solid #1a1a1a; color: var(--p); padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 12px; resize: none; }
    .btn-main { width: 100%; padding: 20px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 1.2rem; transition: 0.3s; }
    .btn-main:hover { box-shadow: 0 0 30px var(--p); transform: scale(1.01); }
    .btn-copy { width: 100%; margin-top: 10px; padding: 10px; background: transparent; border: 1px solid #333; color: #888; cursor: pointer; border-radius: 5px; transition: 0.3s; }
    .btn-copy:hover { border-color: var(--p); color: var(--p); }
</style>
</head>
<body>

<div class="wrapper">
    <h1 style="color:var(--p); margin-bottom:5px;">N60 HUB 🛡️</h1>
    <p style="font-size:12px; opacity:0.5;">Event Horizon v8.4 (Syntax Fix - Guaranteed Execution)</p>

    <div class="obf-panel">
        <h2 style="color:var(--p); margin:0;">GHOST ENGINE v8.4 (STABLE)</h2>
        <textarea id="srcIn" placeholder="-- ضع سكربت Lua هنا (مثال: print('Hello World'))"></textarea>
        <button class="btn-main" onclick="processObf()">تشفير وحماية السكربت 🛡️</button>
        <textarea id="resOut" readonly placeholder="الكود المشفّر النهائي سيظهر هنا..."></textarea>
        <button class="btn-copy" onclick="copyCode()">نسخ الكود المشفّر 📋</button>
    </div>

    <p style="margin-top:40px; font-size:10px; color:#333; letter-spacing:3px;">-- N60 HUB SOVEREIGN PROTECTION 2026 --</p>
</div>

<script type="application/lua" id="luaLogic">
    function run_shield(source)
        local k1, k2, k3 = math.random(60,120), math.random(120,180), math.random(180,240)
        local ops = {1, 2, 3}
        for i = #ops, 2, -1 do
            local j = math.random(i)
            ops[i], ops[j] = ops[j], ops[i]
        end
        local G, L, C = ops[1], ops[2], ops[3]
        
        local function enc(s, k)
            local r = ""
            for i=1, #s do 
                r = r .. (string.byte(s, i) ~ k) .. "," 
            end
            return r
        end

        local func_name = source:match("([%w_%.]+)%s*%(") or "print"
        local target = source:match("%((['\"])(.-)%1%)") or source:match("'(.-)'") or source:match('"(.-)"') or "N60_HUB"
        
        local data = "--[[ N60 EVENT HORIZON v8.4 STABLE ]]\n"
        data = data .. "local _D = {{ " .. (G ~ k1) .. ", '" .. enc(func_name, k2) .. "' }, { " .. (L ~ k1) .. ", '" .. enc(target, k2) .. "' }, { " .. (C ~ k1) .. " }}\n"
        data = data .. "local _K = {" .. k1 .. "," .. k2 .. "," .. k3 .. "}\n"
        data = data .. [[
local _E = (getgenv or getfenv)()
local _S = {}
local function _I(_instr, _keys)
    local _p = 1
    local _k1, _k2, _k3 = _keys[1], _keys[2], _keys[3]
    
    local function _u(_d, _k)
        local _s = ""
        if not _d then return "" end
        for _b in _d:gmatch("(%d+),") do 
            _s = _s .. string.char(tonumber(_b) ~ _k) 
        end
        return _s
    end

    while _p <= #_instr do
        local _i = _instr[_p]
        local _c = _i[1] ~ _k1
        
        if _c == ]] .. G .. [[ then
            local _name = _u(_i[2], _k2)
            local _f = _E[_name]
            if not _f and _name:find("%.") then
                local _parts = {}
                for _part in _name:gmatch("[^%.]+") do table.insert(_parts, _part) end
                _f = _E[_parts[1]]
                for _idx=2, #_parts do
                    if _f then _f = _f[_parts[_idx]] end
                end
            end
            table.insert(_S, _f)
        elseif _c == ]] .. L .. [[ then
            local _r = _u(_i[2], _k2)
            local _m = ""
            for _j=1, #_r do 
                _m = _m .. (string.byte(_r, _j) ~ _k3) .. "," 
            end
            table.insert(_S, _m)
        elseif _c == ]] .. C .. [[ then
            local _v = _u(table.remove(_S), _k3)
            local _f = table.remove(_S)
            if _f then 
                pcall(function() _f(_v) end)
            end
        end
        _p = _p + 1
    end
end
pcall(_I, _D, _K)
_D = nil; _K = nil; _I = nil;
]]
        return data
    end
</script>

<script>
    function processObf() {
        try {
            const input = document.getElementById('srcIn').value;
            if(!input) return alert("ضع سكربت أولاً!");
            
            const L = fengari.L;
            const luaCode = document.getElementById('luaLogic').innerText;
            
            // تحميل كود اللوا
            const loadStatus = fengari.load(luaCode)();
            
            fengari.lua.lua_getglobal(L, "run_shield");
            fengari.lua.lua_pushstring(L, input);
            
            const status = fengari.lua.lua_pcall(L, 1, 1, 0);
            if (status !== 0) {
                const err = fengari.lua.lua_tostring(L, -1);
                alert("خطأ في التشفير: " + fengari.to_jsstring(err));
                return;
            }
            
            const result = fengari.lua.lua_tostring(L, -1);
            document.getElementById('resOut').value = fengari.to_jsstring(result);
        } catch (e) {
            alert("حدث خطأ تقني: " + e.message);
        }
    }

    function copyCode() {
        const copyText = document.getElementById("resOut");
        if(!copyText.value) return alert("لا يوجد كود لنسخه!");
        copyText.select();
        document.execCommand("copy");
        alert("تم نسخ الكود المشفّر بنجاح! ✅");
    }
</script>
</body>
</html>
