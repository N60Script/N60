<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lua Obfuscator | Executor-Only</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --primary: #ff3e3e; --accent: #00ff41; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; border: 1px solid #333; padding: 25px; border-radius: 5px; background: var(--card); }
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        textarea { width: 100%; height: 250px; background: #000; border: 1px solid #444; color: var(--accent); padding: 15px; margin-top: 10px; border-radius: 4px; }
        .btn-encrypt { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin: 20px 0; border-radius: 4px; }
        .btn-encrypt:hover { background: #cc0000; }
        .output-wrapper { position: relative; }
        .btn-copy { position: absolute; top: 10px; left: 10px; background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; }
        .status-bar { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fused Obfuscator (Anti-Reverse)</h1>
    
    <label>INPUT SCRIPT:</label>
    <textarea id="inputCode" placeholder="-- ضع السكربت هنا..."></textarea>

    <button class="btn-encrypt" onclick="process()">تشفير وحماية للـ Executor 🔥</button>

    <div class="output-wrapper">
        <label>PROTECTED OUTPUT:</label>
        <button class="btn-copy" onclick="copy()">COPY</button>
        <textarea id="outputCode" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
    </div>
    
    <div class="status-bar">المميزات: فحص البيئة (Executor Check) + تشفير Binary + طبقة Taurus</div>
</div>

<script type="application/lua" id="obfEngine">
    -- وظيفة تحويل الكود إلى بايتات مشفرة
    local function to_bytes(str)
        local bytes = {}
        for i = 1, #str do
            bytes[i] = string.byte(str, i)
        end
        return "{" .. table.concat(bytes, ",") .. "}"
    end

    function protect_script(original_source)
        local encoded_source = to_bytes(original_source)
        
        -- السكربت "الحارس" الذي سيتم وضعه داخل الملف المشفر
        local guardian_template = [[

    PROTECTED BY GHOST-DUCKY FUSED OBFUSCATOR
    ENVIRONMENT: ROBLOX EXECUTOR ONLY
]]

    -- فحص الميزات التي لا تتوفر إلا في الـ Executors
    if (getgenv or getfenv) and (identifyexecutor or getexecutorname or Drawing) then
        return true
    end
    return false
end

if not check_env() then
    print("Security: This script is only allowed to run within a Roblox Executor.")
    return 
end

local _data = ]] .. encoded_source .. [[

    _decoded = _decoded .. string.char(_data[i])
end

local _run = loadstring(_decoded)
if _run then
    _run()
else
    warn("Failed to execute protected byte-code.")
end
]]
        return guardian_template
    end
</script>

<script>
    function process() {
        const input = document.getElementById('inputCode').value;
        if(!input) return alert("أدخل الكود أولاً!");
        
        const L = fengari.L;
        const luaCode = document.getElementById('obfEngine').innerText;
        fengari.load(luaCode)();
        
        fengari.lua.lua_getglobal(L, "protect_script");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        
        const result = fengari.lua.lua_tostring(L, -1);
        document.getElementById('outputCode').value = result;
    }

    function copy() {
        const out = document.getElementById('outputCode');
        out.select();
        document.execCommand('copy');
        alert("تم النسخ!");
    }
</script>
