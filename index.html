<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N60 Hub | Universal Obfuscator v9.0 (Full Screen)</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --p: #00ff6a; --bg: #000; --card: #0a0a0a; }
    * { box-sizing: border-box; font-family: 'Consolas', 'Courier New', monospace; }
    
    html, body { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: var(--bg); color: white; direction: rtl; overflow: hidden;
    }

    .wrapper { 
        width: 100vw; height: 100vh; display: flex; flex-direction: column; 
        align-items: center; justify-content: center; 
        background: radial-gradient(circle at top, #001f0d, #000); padding: 20px;
    }

    .obf-panel { 
        width: 100%; height: 100%; max-width: 1400px; 
        background: var(--card); border: 2px solid var(--p); 
        padding: 30px; border-radius: 20px; 
        box-shadow: 0 0 50px rgba(0,255,106,0.1); 
        display: flex; flex-direction: column;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { color: var(--p); margin: 0; font-size: 2.5rem; text-shadow: 0 0 20px var(--p); }
    .header p { font-size: 14px; opacity: 0.5; margin: 5px 0; }

    .editors { flex: 1; display: flex; gap: 20px; margin-bottom: 20px; min-height: 0; }
    .editor-container { flex: 1; display: flex; flex-direction: column; }
    .editor-container label { color: var(--p); margin-bottom: 10px; font-weight: bold; font-size: 1.1rem; }

    textarea { 
        flex: 1; width: 100%; background: #000; border: 1px solid #1a1a1a; 
        color: var(--p); padding: 20px; border-radius: 12px; 
        font-size: 13px; resize: none; outline: none; transition: 0.3s;
    }

    textarea:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(0,255,106,0.2); }

    .controls { display: flex; gap: 15px; }
    .btn-main { 
        flex: 2; padding: 20px; background: var(--p); color: #000; 
        border: none; font-weight: 900; cursor: pointer; border-radius: 12px; 
        font-size: 1.4rem; transition: 0.3s; 
    }
    .btn-main:hover { box-shadow: 0 0 40px var(--p); transform: translateY(-2px); }

    .btn-copy { 
        flex: 1; padding: 20px; background: transparent; border: 2px solid #333; 
        color: #888; cursor: pointer; border-radius: 12px; font-weight: bold; transition: 0.3s; 
    }
    .btn-copy:hover { border-color: var(--p); color: var(--p); }

    .footer { margin-top: 20px; text-align: center; font-size: 12px; color: #333; letter-spacing: 5px; }

    @media (max-width: 768px) { .editors { flex-direction: column; } .header h1 { font-size: 1.8rem; } }
</style>
</head>
<body>

<div class="wrapper">
    <div class="obf-panel">
        <div class="header">
            <h1>N60 HUB 🛡️</h1>
            <p>Universal Obfuscator v9.0 (Full Screen - Supports All Scripts)</p>
        </div>

        <div class="editors">
            <div class="editor-container">
                <label>الكود المصدري (Lua Source):</label>
                <textarea id="srcIn" placeholder="-- ضع أي سكربت Lua هنا (مهما كان طوله أو تعقيده)"></textarea>
            </div>
            <div class="editor-container">
                <label>الكود المشفّر (Obfuscated Output):</label>
                <textarea id="resOut" readonly placeholder="الكود المشفّر النهائي سيظهر هنا..."></textarea>
            </div>
        </div>

        <div class="controls">
            <button class="btn-main" onclick="processObf()">تشفير وحماية السكربت 🛡️</button>
            <button class="btn-copy" onclick="copyCode()">نسخ الكود 📋</button>
        </div>

        <div class="footer">-- N60 HUB SOVEREIGN PROTECTION 2026 --</div>
    </div>
</div>

<script type="application/lua" id="luaLogic">
    function run_shield(source)
        local k1 = math.random(100, 255)
        local k2 = math.random(100, 255)
        
        -- تشفير النص بالكامل باستخدام XOR مزدوج
        local function enc(s)
            local r = ""
            for i=1, #s do 
                local b = string.byte(s, i)
                r = r .. (b ~ k1 ~ k2) .. "," 
            end
            return r
        end

        local encrypted_source = enc(source)
        
        local data = "--[[ N60 UNIVERSAL v9.0 ]]\n"
        data = data .. "local _D = '" .. encrypted_source .. "'\n"
        data = data .. "local _K = {" .. k1 .. "," .. k2 .. "}\n"
        
        -- محرك فك التشفير والتشغيل (Universal Loader)
        local loader = [[
local function _L(_d, _k)
    local _s = ""
    local _k1, _k2 = _k[1], _k[2]
    for _b in _d:gmatch("(%d+),") do 
        _s = _s .. string.char(tonumber(_b) ^ _k1 ^ _k2) 
    end
    local _f, _err = loadstring(_s)
    if _f then 
        pcall(_f) 
    else 
        warn("N60 Error: " .. tostring(_err)) 
    end
end
_L(_D, _K)
_D = nil; _K = nil; _L = nil;
]]
        return data .. loader
    end
</script>

<script>
    function processObf() {
        try {
            const input = document.getElementById('srcIn').value;
            if(!input) return alert("ضع سكربت أولاً!");
            
            const L = fengari.L;
            const luaCode = document.getElementById('luaLogic').innerText;
            
            fengari.load(luaCode)();
            
            fengari.lua.lua_getglobal(L, "run_shield");
            fengari.lua.lua_pushstring(L, input);
            
            const status = fengari.lua.lua_pcall(L, 1, 1, 0);
            if (status !== 0) {
                const err = fengari.lua.lua_tostring(L, -1);
                alert("خطأ في التشفير: " + fengari.to_jsstring(err));
                return;
            }
            
            const result = fengari.lua.lua_tostring(L, -1);
            document.getElementById('resOut').value = fengari.to_jsstring(result);
        } catch (e) {
            alert("حدث خطأ تقني: " + e.message);
        }
    }

    function copyCode() {
        const copyText = document.getElementById("resOut");
        if(!copyText.value) return alert("لا يوجد كود لنسخه!");
        copyText.select();
        document.execCommand("copy");
        alert("تم نسخ الكود المشفّر بنجاح! ✅");
    }
</script>
</body>
</html>
