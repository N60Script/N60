<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد المفاتيح</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px dashed #007bff;
            border-radius: 8px;
            cursor: pointer;
            background-color: #e7f3ff;
            color: #007bff;
            font-weight: bold;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-box:hover {
            background-color: #007bff;
            color: white;
        }

        .result-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .result-text {
            flex-grow: 1;
            text-align: right;
            font-size: 14px;
            color: #333;
            word-break: break-all;
        }

        .copy-btn {
            padding: 8px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background-color: #218838;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <label class="label">ضع المفتاح هنا</label>
    <div class="input-box" onclick="generateKey()">
        اضغط هنا لتوليد المفتاح
    </div>

    <hr>

    <label class="label">المفتاح المستخرج:</label>
    <div class="result-section">
        <div class="result-text" id="keyDisplay">المفتاح: (لم يتم التوليد)</div>
        <button class="copy-btn" onclick="copyKey()">نسخ</button>
    </div>
</div>

<script>
    function generateKey() {
        // إنشاء مفتاح عشوائي بسيط كمثال
        const randomKey = "Delta-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        document.getElementById('keyDisplay').innerText = "المفتاح: " + randomKey;
    }

    function copyKey() {
        const keyText = document.getElementById('keyDisplay').innerText.replace("المفتاح: ", "");
        if (keyText.includes("(لم يتم التوليد)")) {
            alert("الرجاء توليد مفتاح أولاً!");
            return;
        }
        
        navigator.clipboard.writeText(keyText).then(() => {
            alert("تم نسخ المفتاح بنجاح: " + keyText);
        });
    }
</script>

</body>
</html>
