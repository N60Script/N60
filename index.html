<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Absolute Zero v13.1</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --p: #00ff6a; --bg: #000; --card: #080808; }
    * { box-sizing: border-box; font-family: 'Consolas', monospace; }
    body { background: var(--bg); color: white; direction: rtl; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    
    .box { width: 90%; max-width: 1000px; background: var(--card); border: 2px solid var(--p); padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,255,106,0.1); }
    
    h1 { color: var(--p); text-align: center; margin-top: 0; font-size: 2rem; }
    textarea { width: 100%; height: 180px; background: #000; border: 1px solid #1a1a1a; color: var(--p); padding: 15px; border-radius: 10px; margin: 10px 0; font-size: 12px; resize: none; outline: none; }
    
    /* أزرار التحكم */
    .controls { display: flex; flex-direction: column; gap: 10px; }
    .btn-main { padding: 20px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.2rem; transition: 0.3s; }
    .btn-main:hover { box-shadow: 0 0 30px var(--p); transform: translateY(-2px); }
    
    .btn-copy { padding: 15px; background: transparent; border: 2px solid #333; color: #888; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s; }
    .btn-copy:hover { border-color: var(--p); color: var(--p); }
    .btn-copy.success { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="box">
    <h1>N60 ABSOLUTE ZERO v13.1 ❄️</h1>
    <p style="text-align:center; opacity:0.5; font-size:11px;">Chained XOR Protection + Copy Sync</p>
    
    <textarea id="srcIn" placeholder="-- ضع سكربت Lua هنا..."></textarea>
    
    <div class="controls">
        <button class="btn-main" onclick="build()">توليد التشفير المطلق 🛡️</button>
        <textarea id="resOut" readonly placeholder="الكود المشفّر النهائي سيظهر هنا..."></textarea>
        <button id="copyBtn" class="btn-copy" onclick="copyCode()">نسخ الكود المشفّر 📋</button>
    </div>
</div>

<script type="application/lua" id="luaLogic">
function build_zero(source)
    local keys = {math.random(20, 60), math.random(61, 120)}
    local function chained_enc(data, ks)
        local r = {}
        local last = ks[1]
        for i=1, #data do
            local byte = string.byte(data, i)
            local dynamic_key = (last + ks[2] + i) % 256
            local encrypted = byte ~ dynamic_key
            table.insert(r, encrypted)
            last = encrypted
        end
        return table.concat(r, ",")
    end
    local bytecode = chained_enc(source, keys)
    return "--[[ N60 v13.1 ]]\nlocal _Z={" .. bytecode .. "}\nlocal _K={" .. table.concat(keys, ",") .. [[}
local _VM=function(d,k)
    local r,l={},k[1]
    for i=1,#d do
        local dk=(l+k[2]+i)%256
        local c=d[i]~dk
        table.insert(r,string.char(c))
        l=d[i]
    end
    local f=loadstring(table.concat(r))
    if f then pcall(f) end
end
_VM(_Z,_K)]]
end
</script>

<script>
    function build() {
        const input = document.getElementById('srcIn').value;
        if(!input) return alert("الرجاء إدخال كود!");
        const L = fengari.L;
        fengari.load(document.getElementById('luaLogic').innerText)();
        fengari.lua.lua_getglobal(L, "build_zero");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('resOut').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
        
        // إعادة تعيين زر النسخ عند توليد كود جديد
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = "نسخ الكود المشفّر 📋";
        btn.className = "btn-copy";
    }

    function copyCode() {
        const output = document.getElementById('resOut');
        const btn = document.getElementById('copyBtn');
        
        if(!output.value) return alert("لا يوجد كود لنسخه!");
        
        output.select();
        document.execCommand('copy');
        
        // تغيير شكل الزر للتأكيد
        btn.innerHTML = "تم النسخ بنجاح! ✅";
        btn.className = "btn-copy success";
        
        setTimeout(() => {
            btn.innerHTML = "نسخ الكود المشفّر 📋";
            btn.className = "btn-copy";
        }, 2000);
    }
</script>
</body>
</html>
