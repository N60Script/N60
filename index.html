<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 OPS HUB | FIXED EDITION</title>
    <style>
        :root { --p: #00ff6a; --bg: #050505; --card: #0d0d0d; --error: #ff003c; }
        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background: var(--bg); color: white; direction: rtl; margin: 0; padding: 15px; }

        .container { max-width: 900px; margin: auto; text-align: center; }
        h1 { font-size: 3rem; color: var(--p); text-shadow: 0 0 20px var(--p); margin-bottom: 5px; }
        .badge { background: var(--error); padding: 5px 15px; border-radius: 8px; font-size: 1rem; margin-bottom: 30px; display: inline-block; }

        /* قسم التحميلات */
        .dl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .dl-btn { background: #111; border: 2px solid #222; color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-size: 1rem; }
        .dl-btn:hover { border-color: var(--p); }

        /* منطقة التشفير - تم إصلاحها */
        .work-area { background: var(--card); padding: 25px; border-radius: 25px; border: 2px solid #1a1a1a; }
        label { display: block; text-align: right; margin-bottom: 10px; font-size: 1.2rem; color: var(--p); }
        
        textarea { 
            width: 100%; height: 200px; background: #000; color: #fff; 
            border: 2px solid #222; padding: 15px; border-radius: 15px; 
            font-size: 1.1rem; font-family: monospace; margin-bottom: 20px; 
            outline: none; transition: 0.3s; resize: none;
        }
        textarea:focus { border-color: var(--p); }

        .main-btn { 
            width: 100%; padding: 20px; background: var(--p); color: #000; 
            border: none; font-weight: 900; border-radius: 15px; cursor: pointer; 
            font-size: 1.8rem; box-shadow: 0 8px 0 #009e41; margin-bottom: 25px;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #009e41; }

        #output-section { display: none; }
        .copy-btn { 
            width: 100%; padding: 15px; background: #222; color: var(--p); 
            border: 2px solid var(--p); border-radius: 12px; cursor: pointer; 
            font-size: 1.4rem; font-weight: bold; 
        }
        .success { background: var(--p) !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>N60 OPS HUB 🛡️</h1>
    <div class="badge">نظام الحماية الهجومية - v31.1 المصلح</div>

    <div class="dl-grid">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="dl-btn">DELTA IOS 🍎</a>
        <a href="https://delta-executor.com/Delta.apk" class="dl-btn">DELTA APK 🤖</a>
    </div>

    <div class="work-area">
        <label>ضع الكود الأصلي هنا:</label>
        <textarea id="inputCode" placeholder="print('Hello World')"></textarea>

        <button class="main-btn" onclick="obfuscateNow()">تشفير هجومي (Strike) 🚀</button>

        <div id="output-section">
            <label>الكود المشفّر الناتج (Anti-Hook + Anti-VM):</label>
            <textarea id="outputCode" readonly></textarea>
            <button id="copyBtn" class="copy-btn" onclick="copyResult()">نسخ الكود المشفّر 📋</button>
        </div>
    </div>
</div>

<script>
    function obfuscateNow() {
        const input = document.getElementById('inputCode').value;
        const outSection = document.getElementById('output-section');
        const output = document.getElementById('outputCode');
        
        if(!input || input.length < 2) {
            alert("حط الكود أول يا بطل!");
            return;
        }

        try {
            // منطق التشفير المتقدم OPS
            const key = Math.floor(Math.random() * 255) + 10;
            const junk = "local _G = getgenv and getgenv() or _G; local _env = getfenv(); _env.print, _env.warn = function() end, function() end; ";
            
            // تحويل الكود إلى Decimal مع إزاحة المفتاح
            let encoded = "";
            for(let i=0; i<input.length; i++) {
                encoded += (input.charCodeAt(i) + key) + ",";
            }

            const finalCode = `--[[ N60 OPS v31.1 PROTECTED ]]
${junk}
if not game:GetService("RunService") then while true do end end
local _K = ${key}
local _D = {${encoded.slice(0, -1)}}
local _S = ""
for i=1, #_D do _S = _S .. string.char(_D[i] - _K) end
local _F = loadstring(_S)
if _F then pcall(_F) end`;

            // إظهار النتائج
            output.value = finalCode;
            outSection.style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
            
        } catch (err) {
            alert("حدث خطأ داخلي، جرب كود آخر.");
        }
    }

    function copyResult() {
        const output = document.getElementById('outputCode');
        const btn = document.getElementById('copyBtn');
        
        output.select();
        document.execCommand('copy');
        
        btn.innerText = "تم النسخ بنجاح! ✅";
        btn.classList.add('success');
        
        setTimeout(() => {
            btn.innerText = "نسخ الكود المشفّر 📋";
            btn.classList.remove('success');
        }, 2000);
    }
</script>

</body>
</html>
