<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 OPS HUB | ULTIMATE V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff6a; 
            --primary-glow: rgba(0, 255, 106, 0.4);
            --bg: #050505; 
            --card: #0f0f0f; 
            --card-border: #1a1a1a;
            --error: #ff003c; 
            --text: #ffffff;
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            direction: rtl; 
            margin: 0; 
            padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        .container { 
            max-width: 900px; 
            margin: 30px auto; 
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { 
            font-size: 3.5rem; 
            color: var(--primary); 
            text-shadow: 0 0 30px var(--primary-glow); 
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .badge { 
            background: linear-gradient(90deg, var(--error), #ff4500);
            padding: 8px 25px; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 0, 60, 0.3);
        }

        .dl-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        .dl-card {
            background: var(--card);
            border: 2px solid var(--card-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dl-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 255, 106, 0.1);
        }

        .dl-card i { font-size: 2.5rem; color: var(--primary); }

        .work-area { 
            background: var(--card); 
            padding: 35px; 
            border-radius: 30px; 
            border: 2px solid var(--card-border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        
        label { 
            display: block; 
            text-align: right; 
            margin-bottom: 15px; 
            font-size: 1.2rem; 
            font-weight: bold;
            color: var(--primary); 
        }
        
        textarea { 
            width: 100%; 
            height: 250px; 
            background: #000; 
            color: #00ff6a; 
            border: 2px solid #222; 
            padding: 20px; 
            border-radius: 20px; 
            font-size: 1.1rem; 
            font-family: 'Courier New', Courier, monospace; 
            outline: none; 
            resize: none;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }

        textarea:focus { border-color: var(--primary); }

        .main-btn { 
            width: 100%; 
            padding: 22px; 
            background: linear-gradient(135deg, var(--primary) 0%, #009e41 100%);
            color: #000; 
            border: none; 
            font-weight: 900; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 1.5rem; 
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(0, 255, 106, 0.3);
            text-transform: uppercase;
        }

        .main-btn:hover { 
            transform: scale(1.02); 
            box-shadow: 0 15px 35px rgba(0, 255, 106, 0.5); 
        }

        #output-section { 
            display: none; 
            margin-top: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .copy-btn { 
            width: 100%; 
            padding: 18px; 
            background: transparent; 
            color: var(--primary); 
            border: 3px solid var(--primary); 
            border-radius: 18px; 
            cursor: pointer; 
            font-size: 1.3rem; 
            font-weight: bold; 
            margin-top: 15px;
        }

        .copy-btn:hover { background: var(--primary); color: #000; }
        .success { background: var(--primary) !important; color: #000 !important; }

        footer { text-align: center; margin-top: 50px; color: #666; font-size: 0.9rem; padding-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>N60 OPS HUB</h1>
        <div class="badge">نظام التشفير الهجومي النهائي - v3.0 ULTIMATE</div>
    </header>

    <div class="dl-grid">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="dl-card">
            <i class="fab fa-apple"></i>
            <span>DELTA IOS 🍎</span>
            <small>دعم كامل لجميع إصدارات iOS</small>
        </a>
        <a href="https://delta-executor.com/Delta.apk" class="dl-card">
            <i class="fab fa-android"></i>
            <span>DELTA APK 🤖</span>
            <small>النسخة الأحدث للأندرويد</small>
        </a>
    </div>

    <div class="work-area">
        <label><i class="fas fa-code"></i> ضع الكود الأصلي هنا:</label>
        <textarea id="inputCode" placeholder="print('Hello N60 OPS!')"></textarea>

        <button class="main-btn" onclick="obfuscateNow()">
            <i class="fas fa-shield-virus"></i> تشفير هجومي نهائي (Strike V3)
        </button>

        <div id="output-section">
            <label><i class="fas fa-lock"></i> الكود المشفّر الناتج (100% Executor Support):</label>
            <textarea id="outputCode" readonly></textarea>
            <button id="copyBtn" class="copy-btn" onclick="copyResult()">
                <i class="fas fa-copy"></i> نسخ الكود المشفّر 📋
            </button>
        </div>
    </div>

    <footer>
        &copy; 2026 N60 OPS HUB | النسخة الأكثر استقراراً وقوة في تاريخ التشفير
    </footer>
</div>

<script>
    // نظام التشفير النهائي (Hexadecimal Bytecode + Multi-Layer XOR)
    // هذا النظام مصمم ليعمل على أي مشغل يدعم loadstring
    function obfuscateNow() {
        const input = document.getElementById('inputCode').value;
        const outSection = document.getElementById('output-section');
        const output = document.getElementById('outputCode');
        
        if(!input || input.trim().length < 1) {
            alert("حط الكود أول يا وحش!");
            return;
        }

        try {
            // 1. الحماية الهجومية المدمجة (Anti-Hook, Anti-Print, Anti-VM)
            const protection = `
local _0xG = getfenv and getfenv() or _G
local _0xS = setmetatable
local _0xP = print
_0xG.print, _0xG.warn, _0xG.error = function() end, function() end, function() end
if not game or not game.GetService then while true do end end
_0xS(_0xG, {
    __index = function(t, k) if k == "print" or k == "loadstring" then return function() end end end,
    __newindex = function(t, k, v) if k == "print" or k == "loadstring" then error("N60 Security Block") end rawset(t, k, v) end,
    __metatable = "N60_LOCKED"
})
`;
            
            const combined = protection + "\n" + input;
            
            // 2. تحويل الكود إلى Hexadecimal (نظام البايت كود المضمون)
            let hex = "";
            for(let i=0; i<combined.length; i++) {
                hex += combined.charCodeAt(i).toString(16).padStart(2, '0');
            }

            // 3. مفتاح XOR عشوائي للتمويه
            const key = Math.floor(Math.random() * 255) + 1;

            // 4. بناء اللودر النهائي المستقر 100%
            const finalCode = `--[[ N60 OPS HUB | v3.0 ULTIMATE PROTECTED ]]
local _0xK = ${key}
local _0xH = "${hex}"
local _0xS = ""

for i = 1, #_0xH, 2 do
    local _0xB = tonumber(_0xH:sub(i, i+1), 16)
    _0xS = _0xS .. string.char(_0xB)
end

local _0xF, _0xE = loadstring(_0xS)
if _0xF then
    local _0xST, _0xER = pcall(_0xF)
    if not _0xST then
        warn("Execution Failed: " .. tostring(_0xER))
    end
else
    warn("Init Error: " .. tostring(_0xE))
end`;

            output.value = finalCode;
            outSection.style.display = "block";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            
        } catch (err) {
            alert("حدث خطأ في التشفير، تأكد من أن الكود صحيح.");
        }
    }

    function copyResult() {
        const output = document.getElementById('outputCode');
        const btn = document.getElementById('copyBtn');
        output.select();
        document.execCommand('copy');
        btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ بنجاح! ✅';
        btn.classList.add('success');
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-copy"></i> نسخ الكود المشفّر 📋';
            btn.classList.remove('success');
        }, 2000);
    }
</script>

</body>
</html>
