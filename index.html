<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>N60 Hub | Ghost VM v15.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #000; }
        body { background: var(--bg); color: white; direction: rtl; font-family: 'Consolas', monospace; text-align: center; padding: 20px; }
        .main { max-width: 900px; margin: auto; background: #0a0a0a; border: 1px solid var(--p); padding: 30px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,255,106,0.1); }
        textarea { width: 100%; height: 200px; background: #000; border: 1px solid #1a1a1a; color: var(--p); padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 11px; outline: none; }
        .btn { width: 100%; padding: 20px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.3rem; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 40px var(--p); transform: translateY(-2px); }
        .copy-btn { width: 100%; margin-top: 10px; padding: 15px; background: transparent; border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .copy-btn:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body>

<div class="main">
    <h1 style="color:var(--p)">N60 GHOST VM v15.0 🛡️</h1>
    <p style="opacity:0.5; font-size:12px;">XOR Dynamic Key | Variable Renaming | Anti-Dump Logic</p>
    
    <textarea id="src" placeholder="-- ضع كود الـ Lua هنا..."></textarea>
    <button class="btn" onclick="obfuscate()">بناء الحماية الشاملة 🚀</button>
    <textarea id="res" readonly placeholder="الكود المشفّر النهائي..."></textarea>
    <button class="copy-btn" onclick="copy()">نسخ السكربت 📋</button>
</div>

<script type="application/lua" id="engine">
function protect_v15(source)
    local key = "N60_" .. math.random(1000, 9999)
    
    local function xor_rolling(data, k)
        local r = {}
        for i=1, #data do
            local k_char = k:byte((i - 1) % #k + 1)
            -- XOR متداخل مع الموقع الحالي لإفساد التحليل الإحصائي
            table.insert(r, string.byte(data, i) ~ k_char ~ (i % 256))
        end
        return table.concat(r, ",")
    end

    local bytecode = xor_rolling(source, key)
    local output = "--[[ N60 GHOST VM v15.0 ]]\n"
    output = output .. "local _l1l1 = {" .. bytecode .. "}\n"
    output = output .. "local _k1k1 = '" .. key .. "'\n"
    output = output .. [[
local _0x1a = function(d, k)
    local r = ""
    for i=1, #d do
        local kc = k:byte((i - 1) % #k + 1)
        r = r .. string.char(d[i] ~ kc ~ (i % 256))
    end
    local f, e = loadstring(r)
    if f then 
        r = nil -- تدمير الدليل فوراً
        local s, err = pcall(f)
        if not s then warn("Runtime Error: " .. tostring(err)) end
    else 
        warn("Critical Error: " .. tostring(e))
    end
end
_0x1a(_l1l1, _k1k1)
]]
    return output
end
</script>

<script>
    function obfuscate() {
        const input = document.getElementById('src').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('engine').innerText)();
        fengari.lua.lua_getglobal(L, "protect_v15");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('res').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }
    function copy() {
        const r = document.getElementById('res');
        r.select();
        document.execCommand('copy');
        alert("تم النسخ بنجاح! جربه في المشغل الآن.");
    }
</script>
</body>
</html>
