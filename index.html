<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | CORE v26.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #050505; }
        body { background: var(--bg); color: white; direction: rtl; font-family: sans-serif; margin: 0; padding: 15px; }
        .box { max-width: 800px; margin: auto; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 15px; }
        h1 { color: var(--p); text-align: center; font-size: 1.2rem; }
        textarea { width: 100%; height: 150px; background: #000; color: var(--p); border: 1px solid #222; padding: 12px; border-radius: 10px; font-family: monospace; margin-bottom: 10px; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
        .btn-copy { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 10px; cursor: pointer; }
        .install-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .inst-btn { background: #111; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h1>N60 CORE EXECUTOR-READY v26 🛡️</h1>
    
    <div class="install-grid">
        <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="inst-btn">Delta iOS 🍎</a>
        <a href="https://delta-executor.com/Delta.apk" class="inst-btn">Delta APK 🤖</a>
    </div>

    <textarea id="input" placeholder="أدخل كود Lua هنا..."></textarea>
    <button class="btn-main" onclick="runCoreObf()">تشفير (نسخة التوافق القصوى) 🚀</button>
    <textarea id="output" readonly placeholder="الكود المشفّر سيظهر هنا..."></textarea>
    <button id="cp" class="btn-copy" onclick="copyCore()">نسخ الكود 📋</button>
</div>

<script type="application/lua" id="coreEngine">
function core_obf(src)
    local k = math.random(50, 150)
    local encoded = ""
    for i=1, #src do
        encoded = encoded .. (string.byte(src, i) + k) .. ","
    end
    
    return "--[[ N60 CORE v26 ]]\nlocal _K="..k.."\nlocal _D={"..encoded.."}\nlocal _S=''\nfor i=1,#_D do _S=_S..string.char(_D[i]-_K) end\nlocal _F, _E = loadstring(_S)\nif _F then _F() else print(_E) end"
end
</script>

<script>
    function runCoreObf() {
        const input = document.getElementById('input').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('coreEngine').innerText)();
        fengari.lua.lua_getglobal(L, "core_obf");
        fengari.lua.lua_pushstring(L, input);
        if(fengari.lua.lua_pcall(L, 1, 1, 0) == 0) {
            document.getElementById('output').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
        }
    }

    function copyCore() {
        const out = document.getElementById('output');
        const btn = document.getElementById('cp');
        out.select();
        document.execCommand('copy');
        btn.innerHTML = "تم النسخ! ✅";
        setTimeout(() => { btn.innerHTML = "نسخ الكود 📋"; }, 2000);
    }
</script>
</body>
</html>
