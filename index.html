<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Nova VM v17.0 Professional</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --p: #00ff6a; --bg: #000; }
    body { background: var(--bg); color: white; direction: rtl; font-family: 'Consolas', monospace; text-align: center; padding: 20px; margin: 0; }
    .wrapper { max-width: 1000px; margin: auto; background: #050505; border: 1px solid var(--p); padding: 40px; border-radius: 20px; box-shadow: 0 0 60px rgba(0,255,106,0.1); }
    textarea { width: 100%; height: 220px; background: #000; border: 1px solid #1a1a1a; color: var(--p); padding: 15px; border-radius: 12px; font-size: 11px; margin: 15px 0; outline: none; transition: 0.3s; }
    textarea:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(0,255,106,0.2); }
    .btn-vm { width: 100%; padding: 22px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 12px; font-size: 1.4rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
    .btn-vm:hover { background: #fff; box-shadow: 0 0 40px #fff; transform: translateY(-3px); }
    .footer { margin-top: 30px; font-size: 10px; color: #333; letter-spacing: 5px; }
</style>
</head>
<body>

<div class="wrapper">
    <h1 style="color:var(--p); margin-top:0;">N60 NOVA VM v17.0 🌌</h1>
    <p style="opacity:0.6; font-size:12px;">Virtualization Engine | Control Flow Flattening | Anti-Tamper</p>
    
    <textarea id="inputCode" placeholder="-- ضع كود الـ Lua هنا للتحويل إلى Virtual Machine..."></textarea>
    <button class="btn-vm" onclick="buildVM()">بناء الآلة الافتراضية 🛠️</button>
    <textarea id="outputCode" readonly placeholder="Bytecode الافتراضي سيظهر هنا..."></textarea>
    <button class="btn-vm" style="background:#111; color:#fff; border:1px solid #333; margin-top:10px;" onclick="copy()">نسخ السكربت المشفّر 📋</button>
    
    <div class="footer">-- SECURE VIRTUALIZATION PROTOCOL 2026 --</div>
</div>

<script type="application/lua" id="vmLogic">
function nova_vm_protect(source)
    local seed = math.random(1000, 9999)
    
    -- محاكاة تحويل الكود إلى Opcodes (Virtualization)
    local function serialize(s)
        local t = {}
        for i=1, #s do
            -- تشفير معقد باستخدام موقع الحرف والـ Seed وعمليات حسابية (Anti-Deobfuscation)
            local op = (string.byte(s, i) + seed + (i * 7)) % 256
            table.insert(t, string.format("0x%02X", op))
        end
        return table.concat(t, ", ")
    end

    local bytecode = serialize(source)
    
    local out = "--[[ N60 NOVA VM v17.0 ]]\n"
    out = out .. "local _OPS = {" .. bytecode .. "}\n"
    out = out .. "local _S = " .. seed .. "\n"
    out = out .. [[
local _VM = function(ops, s)
    -- Anti-Debug: التحقق من البيئة
    if (debug and (debug.getupvalue or debug.setupvalue)) then return end
    
    local _P = 1
    local _R = ""
    local _ST = 0 -- Control Flow State
    
    -- حلقة التنفيذ الضخمة (Control Flow Flattening)
    while _ST ~= -1 do
        if _ST == 0 then
            for i=1, #ops do
                local char = (ops[i] - s - (i * 7)) % 256
                _R = _R .. string.char(char)
            end
            _ST = 1
        elseif _ST == 1 then
            local f, e = loadstring(_R)
            if f then 
                _R = nil
                local ok, res = pcall(f)
                if not ok then warn(res) end
            end
            _ST = -1
        end
    end
end
_VM(_OPS, _S)
]]
    return out
end
</script>

<script>
    function buildVM() {
        try {
            const input = document.getElementById('inputCode').value;
            if(!input) return alert("ضع كوداً أولاً!");
            
            const L = fengari.L;
            fengari.load(document.getElementById('vmLogic').innerText)();
            fengari.lua.lua_getglobal(L, "nova_vm_protect");
            fengari.lua.lua_pushstring(L, input);
            
            if (fengari.lua.lua_pcall(L, 1, 1, 0) !== 0) {
                alert("Error: " + fengari.lua.lua_tostring(L, -1));
                return;
            }
            
            document.getElementById('outputCode').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
        } catch(e) {
            alert("حدث خطأ تقني: " + e.message);
        }
    }

    function copy() {
        const out = document.getElementById('outputCode');
        if(!out.value) return;
        out.select();
        document.execCommand('copy');
        alert("تم نسخ الـ VM بنجاح! جاهز للتشغيل. ✅");
    }
</script>
</body>
</html>
