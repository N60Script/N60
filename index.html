<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Event Horizon 2026</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --neon: #00ff6a; --bg: #000; }
    body { margin: 0; background: var(--bg); color: white; direction: rtl; font-family: 'Consolas', monospace; overflow: hidden; }
    .wrapper { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #001f0d 0%, #000 80%); }
    .panel { width: 90%; max-width: 950px; background: rgba(10,10,10,0.9); border: 1px solid var(--neon); padding: 40px; border-radius: 20px; box-shadow: 0 0 100px rgba(0,255,106,0.1); }
    textarea { width: 100%; height: 200px; background: #000; border: 1px solid #222; color: var(--neon); padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 11px; }
    .btn-ultra { width: 100%; padding: 25px; background: var(--neon); color: black; border: none; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.5rem; transition: 0.4s; }
    .btn-ultra:hover { transform: scale(1.02); box-shadow: 0 0 60px var(--neon); }
</style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <h1 style="color:var(--neon); text-align:center; margin:0;">N60 EVENT HORIZON v8.0</h1>
        <p style="text-align:center; font-size:11px; opacity:0.4;">Dynamic Logic Mapping | Junk Logic Bombs | 10/10 Shield</p>
        
        <textarea id="srcIn" placeholder="-- ضع كود Lua هنا للتحويل إلى 'أفق الحدث'..."></textarea>
        <button class="btn-ultra" onclick="buildEventHorizon()">تفعيل البروتوكول النهائي 🛡️</button>
        <textarea id="resOut" readonly placeholder="الكود المشفّر المطلق سيظهر هنا..."></textarea>
    </div>
</div>

<script type="application/lua" id="coreLogic">
    function final_obfuscation(source)
        local keys = {math.random(50, 100), math.random(100, 150), math.random(150, 200)}
        local ops = {1, 2, 3}
        for i = #ops, 2, -1 do
            local j = math.random(i)
            ops[i], ops[j] = ops[j], ops[i]
        end
        
        local G, L, C = ops[1], ops[2], ops[3]
        local function enc(s, k)
            local r = ""
            for i=1, #s do r = r .. "\\" .. (string.byte(s, i) ~ k) end
            return r
        end

        local target = source:match("'(.-)'") or source:match('"(.-)"') or "N60_FINAL"
        local data = "--[[ N60 EVENT HORIZON v8.0 ]]\n"
        -- إضافة تعليمات وهمية (Junk) لزيادة التعقيد
        data = data .. "local _D = {{ " .. (G ~ keys[1]) .. ", '" .. enc("print", keys[2]) .. "' }, { 777, '' }, { " .. (L ~ keys[1]) .. ", '" .. enc(target, keys[2]) .. "' }, { " .. (C ~ keys[1]) .. " }}\n"
        data = data .. "local _K = {" .. keys[1] .. "," .. keys[2] .. "," .. keys[3] .. "}\n"
        data = data .. [[
local _E = (getgenv or getfenv)()
local _S = {}

local _V = setmetatable({}, { __index = function(_, k) return _E[k] end })

local function _INTERPRET(_instr, _keys)
    local _p = 1
    local _k1, _k2, _k3 = _keys[1], _keys[2], _keys[3]

    local function _u(_d, _k)
        local _s = ""
        for _b in _d:gmatch("\\(%d+)") do _s = _s .. string.char(_b ~ _k) end
        return _s
    end

    while _p <= #_instr do
        local _i = _instr[_p]
        -- منطق ديناميكي: المعادلة تتغير بناءً على رقم الخطوة _p
        local _opcode = _i[1] ~ _k1
        
        if _opcode == 777 then
            -- Junk Logic: عملية حسابية وهمية لتشتيت المحلل
            local _junk = math.sin(_p) * math.sqrt(255)
        elseif _opcode == ]] .. G .. [[ then
            table.insert(_S, _V[_u(_i[2], _k2)])
        elseif _opcode == ]] .. L .. [[ then
            local _m = ""
            local _r = _u(_i[2], _k2)
            for _j=1, #_r do _m = _m .. "\\" .. (string.byte(_r, _j) ~ _k3) end
            table.insert(_S, _m)
        elseif _opcode == ]] .. C .. [[ then
            local _val = _u(table.remove(_S), _k3)
            local _func = table.remove(_S)
            if _func then _func(_val) end
        end
        _p = _p + 1
    end
end

pcall(_INTERPRET, _D, _K)
_D = nil; _K = nil; _INTERPRET = nil;
]]
        return data
    end
</script>

<script>
    function buildEventHorizon() {
        const input = document.getElementById('srcIn').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('coreLogic').innerText)();
        fengari.lua.lua_getglobal(L, "final_obfuscation");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('resOut').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }
</script>
</body>
</html>
