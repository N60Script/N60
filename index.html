<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Key Extractor Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0f0f0f;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #00ff00;
            width: 450px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        h2 { text-align: center; color: white; margin-bottom: 20px; }
        label { font-size: 14px; color: #aaa; margin-bottom: 8px; display: block; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #00ff00;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .output-box {
            background: #000;
            border: 1px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            word-break: break-all;
        }

        #result { font-weight: bold; font-family: monospace; font-size: 15px; }

        .copy-btn {
            background: #00ff00;
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }

        .loading-bar {
            height: 3px;
            width: 0%;
            background: #00ff00;
            margin-bottom: 10px;
            transition: width 1s;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DELTA BYPASSER</h2>

    <label>ضع الرابط الطويل هنا:</label>
    <input type="text" id="linkInput" placeholder="https://auth.platorelay.com/..." oninput="startBypass()">

    <div class="loading-bar" id="loader"></div>

    <label>المفتاح (Key):</label>
    <div class="output-box">
        <div id="result">في انتظار الرابط...</div>
        <button class="copy-btn" onclick="copyKey()">نسخ</button>
    </div>
</div>

<script>
    function startBypass() {
        const input = document.getElementById('linkInput').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!input.includes('?')) return;

        resultDiv.innerText = "جاري التخطي...";
        loader.style.width = "100%";

        setTimeout(() => {
            try {
                const urlParams = new URLSearchParams(input.substring(input.indexOf('?')));
                let rawData = urlParams.get('d') || urlParams.get('r');

                if (rawData) {
                    // فك التشفير
                    let decoded = atob(rawData);
                    
                    // البحث عن نمط المفتاح (FREE_...) داخل النص المخبص
                    const keyMatch = decoded.match(/FREE_[a-zA-Z0-9]+/);
                    
                    if (keyMatch) {
                        resultDiv.innerText = keyMatch[0];
                        resultDiv.style.color = "#00ff00";
                    } else {
                        // إذا لم يجد النمط، يحاول تنظيف النص من الرموز الغريبة
                        let cleaned = decoded.replace(/[^\x20-\x7E]/g, '').trim();
                        resultDiv.innerText = cleaned || "تعذر استخراج المفتاح الصافي";
                    }
                }
            } catch (e) {
                resultDiv.innerText = "خطأ في فك التشفير";
            }
            loader.style.width = "0%";
        }, 1200);
    }

    function copyKey() {
        const text = document.getElementById('result').innerText;
        if (text.includes("...")) return;
        navigator.clipboard.writeText(text);
        alert("تم نسخ المفتاح!");
    }
</script>

</body>
</html>
