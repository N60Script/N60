<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Key Bypass Tool</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0a;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .main-card {
            background: #161616;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            width: 450px;
        }
        h2 { text-align: center; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .label { display: block; margin-bottom: 10px; font-size: 13px; color: #888; }
        
        .input-area {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            color: #00ff00;
            border-radius: 5px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
        }

        .result-container {
            display: flex;
            background: #000;
            border: 1px solid #00ff00;
            border-radius: 5px;
            padding: 10px;
            align-items: center;
            min-height: 45px;
        }

        #keyOutput {
            flex-grow: 1;
            font-weight: bold;
            word-break: break-all;
            font-size: 14px;
        }

        .copy-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }

        .status {
            font-size: 11px;
            margin-top: 5px;
            color: #ffaa00;
            display: none;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h2>Delta Bypass UI</h2>

    <label class="label">ضع رابط التحقق (Auth URL) هنا:</label>
    <input type="text" id="urlInput" class="input-area" placeholder="https://auth.platorelay.com/..." oninput="processBypass()">
    <div id="statusLabel" class="status">جاري المحاكاة وتخطي الإعلانات...</div>

    <label class="label">المفتاح المستخرج:</label>
    <div class="result-container">
        <div id="keyOutput">في انتظار الرابط...</div>
        <button class="copy-btn" onclick="copyResult()">نسخ</button>
    </div>
</div>

<script>
    // محاكاة لتعطيل الإزعاج كما في الكود الأصلي
    window.alert = () => {};
    window.confirm = () => true;

    function processBypass() {
        const input = document.getElementById('urlInput').value;
        const output = document.getElementById('keyOutput');
        const status = document.getElementById('statusLabel');

        if (!input.includes('?')) {
            output.innerText = "رابط غير مكتمل...";
            return;
        }

        status.style.display = "block";
        output.innerText = "جاري الاستخراج...";

        // محاكاة وقت الانتظار (تخطي الإعلانات)
        setTimeout(() => {
            try {
                // البحث عن r أو d وفك التشفير بـ Base64 (منطق الكود الأصلي)
                const urlObj = new URL(input);
                const params = new URLSearchParams(urlObj.search);
                const encoded = params.get('r') || params.get('d');

                if (encoded && /^[A-Za-z0-9+/=]+$/.test(encoded)) {
                    const decoded = atob(encoded);
                    output.innerText = decoded;
                    status.innerText = "تم التخطي بنجاح!";
                    status.style.color = "#00ff00";
                } else {
                    output.innerText = "تعذر العثور على تشفير صالح";
                    status.innerText = "خطأ في الرابط";
                    status.style.color = "#ff4444";
                }
            } catch (e) {
                output.innerText = "خطأ في معالجة الرابط";
                status.style.color = "#ff4444";
            }
        }, 1500); // تأخير بسيط لمحاكاة عملية الـ Bypass
    }

    function copyResult() {
        const text = document.getElementById('keyOutput').innerText;
        if (text === "في انتظار الرابط..." || text === "جاري الاستخراج...") return;
        
        navigator.clipboard.writeText(text);
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "تم!";
        setTimeout(() => btn.innerText = "نسخ", 2000);
    }
</script>

</body>
</html>
