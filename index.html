<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 OPS HUB | GHOST EDITION v4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff6a; 
            --primary-glow: rgba(0, 255, 106, 0.4);
            --bg: #050505; 
            --card: #0d0d0d; 
            --card-border: #1a1a1a;
            --error: #ff003c; 
            --text: #e0e0e0;
        }
        
        * { box-sizing: border-box; font-family: 'Consolas', 'Segoe UI', sans-serif; transition: 0.3s; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            direction: rtl; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* Matrix-like Background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            z-index: -1;
            opacity: 0.5;
        }

        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 { 
            font-size: 3.5rem; 
            color: var(--primary); 
            text-shadow: 0 0 30px var(--primary-glow); 
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .badge { 
            background: linear-gradient(90deg, var(--error), #8b0000);
            padding: 8px 25px; 
            border-radius: 4px; 
            font-size: 0.9rem; 
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
            border: 1px solid var(--error);
        }

        .dl-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 40px; 
        }

        .dl-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dl-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-5px);
            background: #111;
        }

        .dl-card i { font-size: 2.5rem; color: var(--primary); }

        .work-area { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        
        label { 
            display: block; 
            text-align: right; 
            margin-bottom: 15px; 
            font-size: 1.1rem; 
            font-weight: bold;
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        textarea { 
            width: 100%; 
            height: 250px; 
            background: #000; 
            color: #00ff6a; 
            border: 1px solid #222; 
            padding: 20px; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-family: 'Courier New', monospace; 
            outline: none; 
            resize: none;
            box-shadow: inset 0 5px 20px rgba(0,0,0,0.8);
        }

        textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .main-btn { 
            width: 100%; 
            padding: 22px; 
            background: var(--primary);
            color: #000; 
            border: none; 
            font-weight: 900; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.5rem; 
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(0, 255, 106, 0.2);
            text-transform: uppercase;
        }

        .main-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(0, 255, 106, 0.4); 
        }

        #output-section { 
            display: none; 
            margin-top: 50px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .copy-btn { 
            width: 100%; 
            padding: 20px; 
            background: transparent; 
            color: var(--primary); 
            border: 2px solid var(--primary); 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.3rem; 
            font-weight: bold; 
            margin-top: 20px;
        }

        .copy-btn:hover { background: var(--primary); color: #000; }
        .success { background: var(--primary) !important; color: #000 !important; }

        footer { text-align: center; margin-top: 60px; color: #444; font-size: 0.9rem; padding-bottom: 40px; }
    </style>
</head>
<body>

<div class="matrix-bg"></div>

    <div class="dl-grid">

        <textarea id="inputCode" placeholder="-- ضع كود Lua هنا...

            <button id="copyBtn" class="copy-btn" onclick="copyResult()">
                <i class="fas fa-copy"></i> نسخ الكود المشفّر 📋
            </button>
        </div>
    </div>

    <footer>
        &copy; 2026 N60 OPS HUB | نظام الحماية الأكثر تقدماً وصعوبة في الفك
    </footer>
</div>

<script>

    function obfuscateGhost() {
        const input = document.getElementById('inputCode').value;
        const outSection = document.getElementById('output-section');
        const output = document.getElementById('outputCode');
        
        if(!input || input.trim().length < 1) {
            alert("يرجى إدخال الكود أولاً!");
            return;

        try {
            // 1. نظام الحماية الهجومية المشفر (Anti-Hook, Anti-Print, Anti-VM)

            const protection = `

            const bytecodeStr = bytecode.join(",");

            const finalCode = `--[[ N60 OPS HUB | GHOST v4.0 PROTECTED ]]

local _0xK = ${key}
local _0xS = ""

local function _0xX(_0xT)
    local _0xR = ""
    for i = 1, #_0xT do
        _0xR = _0xR .. string.char(bit32 and bit32.bxor(_0xT[i], _0xK) or _0xT[i] - _0xK + (2 * _0xK)) -- Fake math logic
    end
    -- Real XOR fallback for older executors
    if _0xR:sub(1,1) ~= "l" then -- Simple check for 'local'
        _0xR = ""
        for i = 1, #_0xT do
            local _0xA, _0xB = _0xT[i], _0xK
            local _0xRes, _0xM = 0, 1
            while _0xA > 0 or _0xB > 0 do
                local _0xA2, _0xB2 = _0xA % 2, _0xB % 2
                if _0xA2 ~= _0xB2 then _0xRes = _0xRes + _0xM end
                _0xA, _0xB, _0xM = math.floor(_0xA / 2), math.floor(_0xB / 2), _0xM * 2

            _0xR = _0xR .. string.char(_0xRes)
        end
    end
    return _0xR
end

local _0xExec, _0xErr = loadstring(_0xX(_0xVM))
if _0xExec then
    pcall(_0xExec)
else
    -- No print/warn to avoid detection
end`;

            output.value = finalCode;
            outSection.style.display = "block";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            
        } catch (err) {
            alert("حدث خطأ غير متوقع في نظام التشفير.");
        }
    }

    function copyResult() {
        const output = document.getElementById('outputCode');
        const btn = document.getElementById('copyBtn');
        output.select();
        document.execCommand('copy');
        btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ بنجاح! ✅';
        btn.classList.add('success');
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-copy"></i> نسخ الكود المشفّر 📋';
            btn.classList.remove('success');
        }, 2000);
    }
</script>

</body>
</html>
