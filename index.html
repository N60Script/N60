<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | Polymorphic VM v12.0</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    :root { --p: #00ff6a; --bg: #000; }
    body { background: var(--bg); color: white; direction: rtl; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .panel { width: 90%; max-width: 1000px; background: #080808; border: 1px solid var(--p); padding: 30px; border-radius: 15px; box-shadow: 0 0 40px rgba(0,255,106,0.05); }
    textarea { width: 100%; height: 200px; background: #000; border: 1px solid #111; color: var(--p); padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 11px; outline: none; }
    .btn { width: 100%; padding: 20px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 1.2rem; transition: 0.3s; }
    .btn:hover { box-shadow: 0 0 30px var(--p); transform: translateY(-2px); }
</style>
</head>
<body>

<div class="panel">
    <h1 style="color:var(--p); text-align:center; margin:0;">N60 POLYMORPHIC VM v12.0 🛡️</h1>
    <p style="text-align:center; opacity:0.4; font-size:11px;">تشفير متغير المفتاح | منطق مشتت | حماية ضد تحليل Python</p>
    
    <textarea id="srcIn" placeholder="-- ضع كود Lua هنا..."></textarea>
    <button class="btn" onclick="buildVM()">توليد التشفير المتغير 🌀</button>
    <textarea id="resOut" readonly placeholder="الكود المشفّر النهائي..."></textarea>
    <button class="btn" style="background:#111; color:#fff; margin-top:10px; border: 1px solid #333;" onclick="copy()">نسخ 📋</button>
</div>

<script type="application/lua" id="vmCore">
function polymorphic_protect(source)
    local seed = math.random(100, 255)
    local function enc(data, s)
        local r = ""
        for i=1, #data do
            -- المفتاح يتغير مع كل حرف (Variable Offset)
            local char_key = (s + i) % 256
            local encrypted = string.byte(data, i) + char_key
            -- حقن أرقام عشوائية (Junk Logic) كل حرفين لتشتيت المحلل
            r = r .. encrypted .. "," .. math.random(1, 100) .. ","
        end
        return r
    end

    local bytecode = enc(source, seed)
    local data = "--[[ N60 POLYMORPHIC VM v12.0 ]]\n"
    data = data .. "local _B = {" .. bytecode .. "}\n"
    data = data .. "local _S = " .. seed .. "\n"
    data = data .. [[
local _VM = function(d, s)
    local res = ""
    local p = 1
    for i=1, #d, 2 do -- القفز فوق الأرقام العشوائية (Junk)
        local char_key = (s + p) % 256
        res = res .. string.char(d[i] - char_key)
        p = p + 1
    end
    local f, e = loadstring(res)
    if f then pcall(f) else warn(e) end
end
_VM(_B, _S)
]]
    return data
end
</script>

<script>
    function buildVM() {
        const input = document.getElementById('srcIn').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('vmCore').innerText)();
        fengari.lua.lua_getglobal(L, "polymorphic_protect");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('resOut').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }
    function copy() {
        const out = document.getElementById('resOut');
        out.select();
        document.execCommand('copy');
        alert("تم النسخ! جرب فكه الآن بـ Python.");
    }
</script>
</body>
</html>
