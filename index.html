<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Obfuscator</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
padding:20px;
}

textarea{
width:90%;
height:200px;
background:#1a1a1a;
color:white;
border:1px solid #444;
padding:10px;
margin:10px;
font-size:14px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
background:#6a00ff;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#8c2cff;
}
</style>
</head>

<body>

<h2>N60 Script Obfuscator</h2>

<h3>السكربت الأصلي</h3>
<textarea id="input"></textarea>

<br>

<button onclick="obfuscate()">تشفير</button>

<h3>السكربت المشفر</h3>
<textarea id="output"></textarea>

<br>

<button onclick="copyText()">نسخ السكربت</button>

<script>

function taurus(source){

let result = ""

for(let i=0;i<source.length;i++){

let byte = source.charCodeAt(i)

result += "\\" + byte

}

return "loadstring(\""+result+"\")()"

}

function blueSecure(source){

let hex=""

for(let i=0;i<source.length;i++){

hex += source.charCodeAt(i).toString(16)

}

return "loadstring(game:HttpGet('data:text/plain;base16,"+hex+"'))()"

}

function obfuscate(){

let input = document.getElementById("input").value

if(!input){
alert("حط السكربت")
return
}

let layer1 = taurus(input)

let layer2 = blueSecure(layer1)

document.getElementById("output").value = layer2

}

function copyText(){

let text = document.getElementById("output")

text.select()

document.execCommand("copy")

alert("تم النسخ")

}

</script>

</body>
</html>
