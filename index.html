<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>N60 Hub | VM Obfuscator v11.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #050505; }
        body { background: var(--bg); color: white; direction: rtl; font-family: 'Consolas', monospace; text-align: center; padding: 20px; }
        .main-box { max-width: 900px; margin: auto; background: #0a0a0a; border: 1px solid var(--p); padding: 30px; border-radius: 20px; box-shadow: 0 0 40px rgba(0,255,106,0.1); }
        textarea { width: 100%; height: 200px; background: #000; color: var(--p); border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; font-size: 12px; margin: 15px 0; outline: none; }
        .btn-gold { width: 100%; padding: 20px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.2rem; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.01); box-shadow: 0 0 30px var(--p); }
    </style>
</head>
<body>

<div class="main-box">
    <h1 style="color:var(--p)">N60 VM ENGINE v11.0 🛡️</h1>
    <p style="opacity:0.5; font-size:12px;">تشفير بنمط الآلة الافتراضية - غير قابل للفك بالطرق التقليدية</p>
    
    <textarea id="src" placeholder="-- ضع كود Lua هنا (مثال: print('Hello World'))"></textarea>
    <button class="btn-gold" onclick="buildVM()">بناء التشفير الافتراضي 🚀</button>
    <textarea id="res" readonly placeholder="الكود المشفّر سيظهر هنا..."></textarea>
    <button class="btn-gold" style="background:#222; color:#fff; margin-top:10px;" onclick="copy()">نسخ السكربت 📋</button>
</div>

<script type="application/lua" id="vmBuilder">
function vm_protect(source)
    local key = math.random(10, 255)
    
    -- تحويل الكود إلى Bytecode مصغر (محاكاة)
    local function to_vm(s)
        local r = ""
        for i=1, #s do
            r = r .. (string.byte(s, i) + key) .. ","
        end
        return r
    end

    local bytecode = to_vm(source)
    
    local final = "--[[ N60 VM v11.0 ]]\n"
    final = final .. "local _B = {" .. bytecode .. "}\n"
    final = final .. "local _K = " .. key .. "\n"
    final = final .. [[
local _E = (getgenv or getfenv)()
local _VM = function(b, k)
    local s = ""
    for i=1, #b do
        s = s .. string.char(b[i] - k)
    end
    local f, e = loadstring(s)
    if f then 
        s = nil -- مسح النص فوراً من الذاكرة
        pcall(f) 
    else 
        warn("VM Error: " .. tostring(e))
    end
end
_VM(_B, _K)
]]
    return final
end
</script>

<script>
    function buildVM() {
        const input = document.getElementById('src').value;
        if(!input) return alert("ضع كود أولاً!");
        const L = fengari.L;
        fengari.load(document.getElementById('vmBuilder').innerText)();
        fengari.lua.lua_getglobal(L, "vm_protect");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('res').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }
    function copy() {
        const r = document.getElementById('res');
        r.select();
        document.execCommand('copy');
        alert("تم النسخ! هذا الكود سيعمل 100% في المشغلات وبحماية أقوى.");
    }
</script>
</body>
</html>
