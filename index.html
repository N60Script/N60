<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>N60 Hub v8.1 Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; direction: rtl; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 800px; margin: auto; background: #111; padding: 30px; border: 2px solid var(--p); border-radius: 15px; }
        textarea { width: 100%; height: 150px; background: #000; color: var(--p); border: 1px solid #333; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 10px; }
        .dl-links { display: flex; gap: 10px; margin-bottom: 20px; }
        .dl-links a { flex: 1; padding: 10px; background: #222; color: var(--p); text-decoration: none; border-radius: 5px; font-size: 12px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="box">
        <h1 style="color:var(--p)">N60 HUB v8.1</h1>
        
        <div class="dl-links">
            <a href="https://delta-executor.com">تحميل Delta (APK/iOS)</a>
            <a href="https://spdmteam.com">تحميل Arceus X</a>
        </div>

        <textarea id="input" placeholder="ضع سكربت Lua هنا..."></textarea>
        <button class="btn" onclick="obfuscate()">تشفير السكربت 🛡️</button>
        <textarea id="output" readonly placeholder="الكود المصلح سيظهر هنا..."></textarea>
        <button class="btn" style="background:#444; color:white;" onclick="copy()">نسخ الكود المشفّر 📋</button>
    </div>

<script type="application/lua" id="engine">
function protect(source)
    local k1, k2, k3 = math.random(50,120), math.random(50,120), math.random(50,120)
    local ops = {1, 2, 3}
    for i = #ops, 2, -1 do
        local j = math.random(i)
        ops[i], ops[j] = ops[j], ops[i]
    end
    local G, L, C = ops[1], ops[2], ops[3]
    
    -- الإصلاح: التشفير باستخدام الفواصل
    local function enc(s, k)
        local r = ""
        for i=1, #s do r = r .. (string.byte(s, i) ~ k) .. "," end
        return r
    end

    local target = source:match("'(.-)'") or source:match('"(.-)"') or "N60"
    local data = "--[[ N60 STABLE v8.1 ]]\n"
    data = data .. "local _D = {{ " .. (G ~ k1) .. ", '" .. enc("print", k2) .. "' }, { " .. (L ~ k1) .. ", '" .. enc(target, k2) .. "' }, { " .. (C ~ k1) .. " }}\n"
    data = data .. "local _K = {" .. k1 .. "," .. k2 .. "," .. k3 .. "}\n"
    data = data .. [[
local _E = (getgenv or getfenv)()
local _S = {}
local function _I(instr, keys)
    local p = 1
    local k1, k2, k3 = keys[1], keys[2], keys[3]
    local function _u(d, k)
        local s = ""
        for b in d:gmatch("(%d+),") do s = s .. string.char(tonumber(b) ~ k) end
        return s
    end
    while p <= #instr do
        local i = instr[p]
        local c = i[1] ~ k1
        if c == ]] .. G .. [[ then
            table.insert(_S, _E[_u(i[2], k2)])
        elseif c == ]] .. L .. [[ then
            local m = ""
            local r = _u(i[2], k2)
            for j=1, #r do m = m .. (string.byte(r, j) ~ k3) .. "," end
            table.insert(_S, m)
        elseif c == ]] .. C .. [[ then
            local v = _u(table.remove(_S), k3)
            local f = table.remove(_S)
            if f then f(v) end
        end
        p = p + 1
    end
end
pcall(_I, _D, _K)
]]
    return data
end
</script>

<script>
    function obfuscate() {
        const input = document.getElementById('input').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('engine').innerText)();
        fengari.lua.lua_getglobal(L, "protect");
        fengari.lua.lua_pushstring(L, input);
        fengari.lua.lua_pcall(L, 1, 1, 0);
        document.getElementById('output').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
    }
    function copy() {
        const out = document.getElementById('output');
        out.select();
        document.execCommand('copy');
        alert("تم النسخ بنجاح! جربه الآن افي الـ Executor.");
    }
</script>
</body>
</html>
