<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>N60 Hub | God-Mode Obfuscator</title>
<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
<style>
    /* التصميم الخاص بك */
    * { box-sizing: border-box; font-family: "Segoe UI", Tahoma; }
    body { margin: 0; background: #000; color: white; direction: rtl; overflow: hidden; }
    .frame { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle, #0a1f0a 0%, #000 100%); }
    .header { height: 70px; display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid #00ff6a; background: rgba(0,0,0,0.8); }
    .nav-btn { background: none; border: 1px solid #00ff6a; color: #00ff6a; padding: 8px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
    .nav-btn.active { background: #00ff6a; color: black; box-shadow: 0 0 15px #00ff6a; }
    .content { flex: 1; padding: 20px; overflow-y: auto; position: relative; }
    .obf-card { max-width: 900px; margin: auto; background: rgba(20,20,20,0.9); padding: 30px; border-radius: 15px; border: 1px solid #333; }
    textarea { width: 100%; height: 200px; background: #050505; border: 1px solid #1a1a1a; color: #00ff6a; padding: 15px; font-family: monospace; font-size: 11px; margin-top: 10px; }
    .btn-main { width: 100%; padding: 15px; background: #00ff6a; color: black; border: none; font-weight: bold; font-size: 18px; margin: 20px 0; cursor: pointer; border-radius: 5px; }
    .footer { font-size: 12px; text-align: center; padding: 10px; color: #444; }
</style>
</head>
<body>

<div class="frame">
    <div class="header">
        <button class="nav-btn active">N60 God-Mode Obfuscator</button>
        <button class="nav-btn" onclick="window.location.reload()">تحديث الصفحة</button>
    </div>

    <div class="content">
        <div class="obf-card">
            <h2 style="color:#00ff6a; text-align:center;">نظام التشفير العسكري (V5)</h2>
            <p style="font-size:12px; opacity:0.6; text-align:center;">إضافة 2000 سطر وهمي + تشفير طبقات XOR + حماية Executor</p>
            
            <label>السكربت المراد حمايته:</label>
            <textarea id="inputCode" placeholder="ضع كودك هنا..."></textarea>
            
            <button class="btn-main" onclick="runGodObfuscation()">تشفير فائق القوة 🚀</button>
            
            <label>السكربت المشفر (المحمي):</label>
            <textarea id="outputCode" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
        </div>
    </div>
    <div class="footer">https://n60script.github.io/N60/ | Protected by Ghost-Ducky</div>
</div>

<script type="application/lua" id="luaEngine">
    function god_obfuscate(source)
        if not source or source == "" then return "-- [!] Empty" end
        
        -- 1. توليد مفاتيح عشوائية
        local key1 = math.random(50, 150)
        local key2 = math.random(1, 10)
        
        -- 2. تشفير البيانات
        local encrypted_table = {}
        for i = 1, #source do
            local byte = string.byte(source, i)
            -- تشفير مزدوج: (Byte XOR key1) + key2
            local val = (byte ~ key1) + key2
            table.insert(encrypted_table, val)
        end
        
        local data_str = table.concat(encrypted_table, ",")

        -- 3. توليد 2000 سطر من الأكواد الوهمية (FakeCode)
        local fake_lines = ""
        for i = 1, 1000 do
            fake_lines = fake_lines .. "local _f" .. i .. " = " .. math.random(1000, 9999) .. "; "
            if i % 10 == 0 then fake_lines = fake_lines .. "\n" end
        end

        -- 4. بناء القالب النهائي مع حماية Executor والتمويه
        local template = "--[[ https://n60script.github.io/N60/ ]]\n"
        template = template .. "local _N60 = function()\n"
        template = template .. "    " .. fake_lines .. "\n" -- هنا الأكواد الوهمية الضخمة
        template = template .. "    local _E = (getgenv or getfenv)()\n"
        template = template .. "    if not (_E.identifyexecutor or _E.getexecutorname) then return end\n"
        template = template .. "    local _K1, _K2 = " .. key1 .. ", " .. key2 .. "\n"
        template = template .. "    local _D = {" .. data_str .. "}\n"
        template = template .. "    local _S = \"\"\n"
        template = template .. "    for i=1, #_D do\n"
        template = template .. "        _S = _S .. string.char((_D[i] - _K2) ~ _K1)\n"
        template = template .. "    end\n"
        template = template .. "    _D = nil; -- مسح البيانات من الذاكرة\n"
        template = template .. "    local _L = _E.loadstring or loadstring\n"
        template = template .. "    local success, err = pcall(_L(_S))\n"
        template = template .. "    if not success then warn('Err: '..err) end\n"
        template = template .. "end\n"
        template = template .. "_N60(); _N60 = nil;"
        
        return template
    end
</script>

<script>
    function runGodObfuscation() {
        const input = document.getElementById('inputCode').value;
        if(!input) return;
        
        document.getElementById('outputCode').value = "جاري حقن 2000 سطر وهمي وتشفير البيانات...";
        
        const L = fengari.L;
        const luaLogic = document.getElementById('luaEngine').innerText;
        
        setTimeout(() => {
            try {
                fengari.load(luaLogic)();
                fengari.lua.lua_getglobal(L, "god_obfuscate");
                fengari.lua.lua_pushstring(L, input);
                fengari.lua.lua_pcall(L, 1, 1, 0);
                
                const result = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
                document.getElementById('outputCode').value = result;
            } catch (e) {
                document.getElementById('outputCode').value = "خطأ: " + e.message;
            }
        }, 500);
    }
</script>

</body>
</html>
