<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | Black-Box v24.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #000; --c: #0d0d0d; }
        body { background: var(--bg); color: white; direction: rtl; font-family: 'Courier New', Courier, monospace; margin: 0; }
        .nav { background: #000; padding: 10px; display: flex; justify-content: center; gap: 5px; border-bottom: 1px solid #333; sticky: top; }
        .nav button { background: #111; border: 1px solid #222; color: #555; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .nav button.active { border-color: var(--p); color: var(--p); }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .card { background: var(--c); border: 1px solid #1a1a1a; padding: 25px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,255,106,0.02); }
        h1 { color: var(--p); text-align: center; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 5px; }
        textarea { width: 100%; height: 200px; background: #050505; color: var(--p); border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; outline: none; font-size: 11px; }
        .btn-main { width: 100%; padding: 18px; background: var(--p); color: #000; border: none; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .btn-install { background: #000; border: 1px solid #222; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; text-decoration: none; color: #fff; font-size: 12px; }
    </style>
</head>
<body>

<div class="nav">
    <button id="b-obf" class="active" onclick="tab('obf')">BLACK-BOX v24</button>
    <button id="b-and" onclick="tab('android')">ANDROID</button>
    <button id="b-ios" onclick="tab('ios')">IOS OTA</button>
</div>

<div class="container">
    <div id="obf" class="section" style="display:block;">
        <div class="card">
            <h1>N60 BLACK-BOX v24.0</h1>
            <p style="text-align:center; font-size:10px; opacity:0.4;">HEURISTIC DECEPTION | ANTI-AI RECONSTRUCTION</p>
            <textarea id="src" placeholder="-- ضع كود الـ Lua هنا للتعمية الشاملة..."></textarea>
            <button class="btn-main" onclick="generate()">DEPLOY BLACK-BOX ENCRYPTION ⚡</button>
            <textarea id="res" readonly placeholder="الكود المعمّى سيظهر هنا..."></textarea>
            <button class="btn-main" style="background:#111; color:#fff; margin-top:10px;" onclick="copy()">نسخ 📋</button>
        </div>
    </div>

    <div id="android" class="section" style="display:none;">
        <div class="card">
            <h1>ANDROID EXECUTORS</h1>
            <div class="grid">
                <a class="btn-install" href="https://delta-executor.com/Delta.apk">DELTA APK</a>
                <a class="btn-install" href="https://spdmteam.com/Arceus.apk">ARCEUS APK</a>
            </div>
        </div>
    </div>

    <div id="ios" class="section" style="display:none;">
        <div class="card">
            <h1>IOS DIRECT INSTALL (OTA)</h1>
            <div class="grid">
                <div class="btn-install" onclick="window.location.href='itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist'">DELTA IOS</div>
                <div class="btn-install" onclick="window.location.href='itms-services://?action=download-manifest&url=https://skibx.com/ota.plist'">SKIBX IOS</div>
            </div>
        </div>
    </div>
</div>

<script type="application/lua" id="engine">
function encrypt(s)
    local k1, k2 = math.random(10, 50), math.random(5, 20)
    local data = ""
    for i=1, #s do
        local b = string.byte(s, i)
        -- معادلة متغيرة بناءً على موقع الحرف (Polynomial Offset)
        local enc = (b + k1) * k2 + i
        data = data .. enc .. "."
    end

    local junk = "local _="..math.random(100,999)..";if _==0 then print('Junk') end;"
    
    local out = "--[[ N60 BLACK-BOX PROTECTION ]]\n"
    out = out .. "local _D = '" .. data .. "'\n"
    out = out .. [[
local _K1, _K2 = ]]..k1..[[, ]]..k2..[[;
local _V = setmetatable({}, {__call = function(t,...)
    local _R = ""
    for v in _D:gmatch("(%d+)%.") do
        local i = #_R + 1
        local d = (tonumber(v) - i) / _K2 - _K1
        _R = _R .. string.char(math.floor(d + 0.5))
    end
    local _B = newproxy and newproxy(true)
    local _M = getmetatable(_B)
    _M.__call = function()
        local f, e = loadstring(_R)
        if f then 
            setfenv(f, getfenv())
            local s, r = pcall(f)
            if not s then warn(r) end
        end
    end
    return _B()
end})
_V()
]]
    return junk .. out
end
</script>

<script>
    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    function generate() {
        const input = document.getElementById('src').value;
        if(!input) return;
        const L = fengari.L;
        fengari.load(document.getElementById('engine').innerText)();
        fengari.lua.lua_getglobal(L, "encrypt");
        fengari.lua.lua_pushstring(L, input);
        if(fengari.lua.lua_pcall(L, 1, 1, 0) == 0) {
            document.getElementById('res').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
        }
    }
    function copy() {
        const r = document.getElementById('res');
        r.select(); document.execCommand('copy');
        alert("تأكد من تجربة الكود في Delta أو Skibx!");
    }
</script>
</body>
</html>
