<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N60 HUB | Nova-LUR v23.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.min.js"></script>
    <style>
        :root { --p: #00ff6a; --bg: #030303; --card: #0a0a0a; }
        * { box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: white; direction: rtl; margin: 0; padding: 0; }
        
        .nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .nav button { background: #111; border: 1px solid var(--p); color: var(--p); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav button.active { background: var(--p); color: black; box-shadow: 0 0 15px var(--p); }

        .container { padding: 20px; max-width: 950px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }

        .card { background: var(--card); border-radius: 20px; padding: 30px; margin-bottom: 20px; border: 1px solid #1a1a1a; box-shadow: 0 0 40px rgba(0,255,106,0.05); }
        h1 { color: var(--p); text-align: center; font-size: 2rem; margin-top: 0; }

        /* Installer Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .btn-install { background: #000; border: 1px solid #222; padding: 20px 10px; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .btn-install:hover { border-color: var(--p); transform: translateY(-5px); }
        .btn-install b { color: var(--p); display: block; margin-bottom: 5px; }

        /* Obfuscator UI */
        textarea { width: 100%; height: 180px; background: #000; color: var(--p); border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; margin: 15px 0; outline: none; font-size: 11px; }
        .btn-go { width: 100%; padding: 20px; background: var(--p); color: black; border: none; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="nav">
    <button id="t-obf" class="active" onclick="tab('obf')">تشفير LUR 🛡️</button>
    <button id="t-and" onclick="tab('android')">أندرويد 🤖</button>
    <button id="t-ios" onclick="tab('ios')">آيفون 🍎</button>
</div>

<div class="container">
    
    <div id="obf" class="section active">
        <div class="card">
            <h1>N60 NOVA-LUR v23.0 🌌</h1>
            <p style="text-align:center; opacity:0.5; font-size:11px;">Metatable-Based Virtualization | Anti-Python / Anti-Sandbox</p>
            <textarea id="src" placeholder="-- الصق كود Lua الأصلي هنا..."></textarea>
            <button class="btn-go" onclick="buildLur()">تشفير الكود بنظام الطبقات 🚀</button>
            <textarea id="res" readonly placeholder="الكود المشفّر النهائي سيظهر هنا..."></textarea>
            <button class="btn-go" style="background:#222; color:#fff; margin-top:10px;" onclick="copyRes()">نسخ السكربت 📋</button>
        </div>
    </div>

    <div id="android" class="section">
        <div class="card">
            <h1>Android Direct 🤖</h1>
            <div class="grid">
                <div class="btn-install" onclick="location.href='https://delta-executor.com/Delta.apk'">
                    <b>Delta</b> <small>تثبيت APK</small>
                </div>
                <div class="btn-install" onclick="location.href='https://spdmteam.com/ArceusX.apk'">
                    <b>Arceus X</b> <small>تثبيت APK</small>
                </div>
            </div>
        </div>
    </div>

    <div id="ios" class="section">
        <div class="card">
            <h1>iOS OTA Install 🍎</h1>
            <div class="grid">
                <div class="btn-install" onclick="location.href='itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist'">
                    <b>Delta iOS</b> <small>Install Direct</small>
                </div>
                <div class="btn-install" onclick="location.href='itms-services://?action=download-manifest&url=https://skibx.com/ota.plist'">
                    <b>SkibX iOS</b> <small>Install Direct</small>
                </div>
            </div>
        </div>
    </div>

</div>

<script type="application/lua" id="engine">
function build_lur(source)
    local seed = math.random(100, 255)
    
    -- تحويل الكود إلى سلسلة Hex معقدة
    local function to_hex(s)
        local h = ""
        for i=1, #s do
            h = h .. string.format("\\%03d", string.byte(s, i) + seed)
        end
        return h
    end

    local payload = to_hex(source)
    local out = "--[[ N60 NOVA-LUR v23.0 ]]\n"
    out = out .. "local _O = '" .. payload .. "'\n"
    out = out .. "local _S = " .. seed .. "\n"
    out = out .. [[
local _ENV = (getfenv and getfenv()) or _G
local _P = newproxy and newproxy(true) or {}
local _M = getmetatable and getmetatable(_P) or {}

_M.__call = function()
    local function _WRAP(...)
        local _R = ""
        _O:gsub("\\(%d%d%d)", function(d)
            _R = _R .. string.char(tonumber(d) - _S)
        end)
        
        local _EXE = function(_SRC)
            local f, e = loadstring(_SRC)
            if f then 
                setfenv(f, _ENV)
                return pcall(f) 
            else 
                return warn("VM_ERR: "..tostring(e))
            end
        end
        return _EXE(_R)
    end
    return _WRAP()
end

-- تفعيل الآلة الافتراضية
if setmetatable then
    local _PROXY = setmetatable({}, _M)
    _PROXY()
else
    _M.__call()
end
]]
    return out
end
</script>

<script>
    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('t-' + id.substring(0,3)).classList.add('active');
    }

    function buildLur() {
        const input = document.getElementById('src').value;
        if(!input) return alert("أدخل كود!");
        const L = fengari.L;
        fengari.load(document.getElementById('engine').innerText)();
        fengari.lua.lua_getglobal(L, "build_lur");
        fengari.lua.lua_pushstring(L, input);
        if(fengari.lua.lua_pcall(L, 1, 1, 0) == 0) {
            document.getElementById('res').value = fengari.to_jsstring(fengari.lua.lua_tostring(L, -1));
        }
    }

    function copyRes() {
        const r = document.getElementById('res');
        r.select();
        document.execCommand('copy');
        alert("تم نسخ الكود بنظام LUR v23!");
    }
</script>
</body>
</html>
